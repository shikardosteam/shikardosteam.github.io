<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shikardos Team</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
/* ===== ADAPTIVE THEME (Telegram CSS vars with fallbacks) ===== */
:root {
  --bg: var(--tg-theme-bg-color, #0c0c0f);
  --card: var(--tg-theme-secondary-bg-color, #15151b);
  --text: var(--tg-theme-text-color, #f4f2ec);
  --hint: var(--tg-theme-hint-color, #8a8a93);
  --link: var(--tg-theme-link-color, #58a6ff);
  --btn: var(--tg-theme-button-color, #d4a843);
  --btn-text: var(--tg-theme-button-text-color, #0c0c0f);
  --border: rgba(128,128,128,0.15);
  --gold: #d4a843;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --orange: #d6a528;
  --purple: #bc8cff;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 68px;
  -webkit-tap-highlight-color: transparent;
}

/* ===== LOADING / ERROR ===== */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; gap:16px; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg) } }
.error-screen { text-align:center; padding:60px 20px; }

/* ===== HEADER ===== */
.header {
  display:flex; align-items:center; gap:12px; padding:12px 16px;
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
  background:var(--bg);
}
.avatar {
  width:40px; height:40px; border-radius:50%; background:var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:17px; font-weight:700; color:var(--bg); flex-shrink:0;
}
.user-info { flex:1; min-width:0; }
.user-info h2 { font-size:15px; font-weight:600; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.user-info .sub { font-size:11px; color:var(--hint); display:flex; align-items:center; gap:4px; }
.role-tag {
  display:inline-block; padding:1px 6px; border-radius:8px;
  font-size:10px; font-weight:600; background:rgba(212,168,67,0.12); color:var(--gold);
}
.dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
.dot.ok { background:var(--green); }
.dot.bad { background:var(--red); }

/* ===== BOTTOM TAB BAR ===== */
.tab-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:var(--card); border-top:1px solid var(--border);
  display:flex; padding:2px 0 env(safe-area-inset-bottom);
}
.tab-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:6px 2px; font-size:9px; color:var(--hint);
  background:none; border:none; cursor:pointer; gap:1px;
  transition: color 0.15s;
}
.tab-btn.active { color:var(--gold); }
.tab-btn .ico { font-size:20px; line-height:1.2; }

/* ===== PAGES ===== */
.page { display:none; padding:12px 14px; }
.page.active { display:block; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* ===== CARDS ===== */
.kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.kpi-grid.three { grid-template-columns:1fr 1fr 1fr; }
.kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px; }
.kpi .val { font-size:20px; font-weight:700; color:var(--gold); }
.kpi .val.green { color:var(--green); }
.kpi .val.red { color:var(--red); }
.kpi .val.blue { color:var(--blue); }
.kpi .lbl { font-size:10px; color:var(--hint); margin-top:2px; }
.kpi .sub { font-size:9px; color:var(--hint); margin-top:1px; }

.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:12px; margin-bottom:10px;
}
.card h3 { font-size:13px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:5px; }

.row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:12px; }
.row .lbl { color:var(--hint); }
.row .val { font-weight:600; }

.list-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-bottom:1px solid var(--border); font-size:12px;
}
.list-item:last-child { border-bottom:none; }

.badge { display:inline-block; padding:2px 6px; border-radius:6px; font-size:10px; font-weight:600; }
.badge.green { background:rgba(63,185,80,0.12); color:var(--green); }
.badge.red { background:rgba(248,81,73,0.12); color:var(--red); }
.badge.orange { background:rgba(214,165,40,0.12); color:var(--orange); }
.badge.blue { background:rgba(88,166,255,0.12); color:var(--blue); }
.badge.gold { background:rgba(212,168,67,0.12); color:var(--gold); }
.badge.muted { background:rgba(128,128,128,0.1); color:var(--hint); }

.empty { text-align:center; padding:20px; color:var(--hint); font-size:12px; }

/* Alert */
.alert { padding:8px 10px; border-radius:8px; font-size:11px; margin-bottom:8px; font-weight:500; }
.alert-success { background:rgba(63,185,80,0.1); color:var(--green); border:1px solid rgba(63,185,80,0.2); }
.alert-warn { background:rgba(214,165,40,0.1); color:var(--orange); border:1px solid rgba(214,165,40,0.2); }
.alert-danger { background:rgba(248,81,73,0.1); color:var(--red); border:1px solid rgba(248,81,73,0.2); }
.alert-info { background:rgba(88,166,255,0.1); color:var(--blue); border:1px solid rgba(88,166,255,0.2); }
.alert-gold { background:rgba(212,168,67,0.1); color:var(--gold); border:1px solid rgba(212,168,67,0.2); }

/* Chart */
.chart-box { position:relative; width:100%; height:160px; }

/* Leaderboard */
.lb-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
.lb-row:last-child { border-bottom:none; }
.lb-rank { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
.lb-rank.g { background:rgba(212,168,67,0.2); color:var(--gold); }
.lb-rank.s { background:rgba(139,148,158,0.2); color:var(--hint); }
.lb-rank.b { background:rgba(214,165,40,0.15); color:var(--orange); }
.lb-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-val { font-weight:700; color:var(--gold); }

/* Progress bar */
.prog { width:100%; height:5px; background:var(--border); border-radius:3px; overflow:hidden; margin:5px 0; }
.prog .fill { height:100%; border-radius:3px; transition:width 0.5s; }

/* More menu grid */
.more-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; padding:4px;
}
.more-item {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:14px 6px; background:var(--card); border:1px solid var(--border);
  border-radius:12px; cursor:pointer; font-size:11px; color:var(--text);
  transition: background 0.15s;
}
.more-item:active { background:var(--border); }
.more-item .mi { font-size:24px; }
.more-back {
  display:flex; align-items:center; gap:6px; padding:10px 0; margin-bottom:8px;
  font-size:13px; color:var(--link); cursor:pointer; font-weight:600;
}

/* Income table */
.inc-tbl { width:100%; font-size:11px; border-collapse:collapse; }
.inc-tbl td, .inc-tbl th { padding:4px 4px; border-bottom:1px solid var(--border); text-align:left; }
.inc-tbl th { color:var(--hint); font-weight:500; font-size:10px; }

/* Mini data table */
.m-tbl { width:100%; font-size:11px; border-collapse:collapse; }
.m-tbl td, .m-tbl th { padding:5px 4px; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; }
.m-tbl th { color:var(--hint); font-weight:500; font-size:10px; }
.m-tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px; padding:0 4px; }

/* Bar chart row */
.bar-row { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:11px; }
.bar-label { width:70px; color:var(--hint); flex-shrink:0; }
.bar-track { flex:1; height:14px; background:var(--border); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; }
.bar-val { width:36px; text-align:right; font-weight:600; font-size:11px; }

/* Slider */
.calc-slider {
  -webkit-appearance:none; width:100%; height:6px; border-radius:3px;
  background:var(--border); outline:none; margin:12px 0;
}
.calc-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:24px; height:24px; border-radius:50%;
  background:var(--gold); cursor:pointer;
}

/* Tier cards */
.tier-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; }
.tier-card { text-align:center; padding:6px 2px; border:1px solid var(--border); border-radius:6px; font-size:10px; }
.tier-card.active { background:rgba(212,168,67,0.1); border-color:var(--gold); }

/* Formula */
.formula-box { padding:6px; font-size:11px; }
.formula-step { padding:3px 0; color:var(--hint); }

/* Note */
.note-box { background:rgba(88,166,255,0.06); border:1px solid rgba(88,166,255,0.15); border-radius:8px; padding:8px; font-size:11px; color:var(--hint); margin-top:8px; }


/* Export button */
.export-btn {
  display:inline-flex; align-items:center; gap:4px; padding:6px 12px;
  background:rgba(88,166,255,0.1); border:1px solid rgba(88,166,255,0.3);
  border-radius:6px; color:var(--blue); font-size:11px; font-weight:600;
  cursor:pointer; margin-bottom:8px; float:right;
}
.export-btn:active { background:rgba(88,166,255,0.2); }

/* Toast */
.toast {
  position:fixed; top:12px; left:50%; transform:translateX(-50%); z-index:9999;
  padding:8px 16px; border-radius:8px; color:#fff; font-size:12px; font-weight:600;
  box-shadow:0 4px 16px rgba(0,0,0,0.3); transition:opacity 0.5s;
}

/* Section divider */
.section-label { font-size:11px; color:var(--hint); font-weight:600; padding:8px 0 4px; text-transform:uppercase; letter-spacing:0.5px; }
</style>
</head>
<body>

<div id="app-loading" class="loading">
  <div class="spinner"></div>
  <div style="color:var(--hint);font-size:13px">Загрузка...</div>
</div>

<div id="app" style="display:none">
  <!-- HEADER -->
  <div class="header">
    <div class="avatar" id="hd-avatar">?</div>
    <div class="user-info">
      <h2 id="hd-name">—</h2>
      <div class="sub"><span class="role-tag" id="hd-role">—</span><span class="dot" id="hd-dot"></span></div>
    </div>
  </div>

  <!-- PAGE: HOME -->
  <div id="pg-home" class="page active"></div>
  <!-- PAGE: SHARES -->
  <div id="pg-shares" class="page"></div>
  <!-- PAGE: TRENDS -->
  <div id="pg-trends" class="page"></div>
  <!-- PAGE: HALL -->
  <div id="pg-hall" class="page"></div>
  <!-- PAGE: MORE (menu) -->
  <div id="pg-more" class="page"></div>
  <!-- PAGE: SUB-PAGES (from More) -->
  <div id="pg-sub" class="page"></div>

  <!-- BOTTOM TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="go('home')"><span class="ico"><i class="ti ti-home"></i></span>Главная</button>
    <button class="tab-btn" onclick="go('shares')"><span class="ico"><i class="ti ti-diamond"></i></span>Акции</button>
    <button class="tab-btn" onclick="go('trends')"><span class="ico"><i class="ti ti-trending-up"></i></span>Тренды</button>
    <button class="tab-btn" onclick="go('hall')"><span class="ico"><i class="ti ti-trophy"></i></span>Зал</button>
    <button class="tab-btn" onclick="go('more')"><span class="ico"><i class="ti ti-settings"></i></span>Ещё</button>
  </div>
</div>

<div id="app-error" class="error-screen" style="display:none">
  <div style="font-size:48px;margin-bottom:12px"><i class="ti ti-lock"></i></div>
  <div style="font-size:15px;font-weight:600;margin-bottom:6px">Вход в систему</div>
  <div id="err-text" style="color:var(--hint);font-size:13px;margin-bottom:16px">Войдите через Telegram бот или по email</div>
  <div id="email-fallback" style="max-width:300px;margin:0 auto">
    <input type="email" id="fb-email" placeholder="Email" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px;margin-bottom:8px;outline:none">
    <input type="password" id="fb-password" placeholder="Пароль" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px;margin-bottom:8px;outline:none">
    <button onclick="emailFallbackLogin()" style="width:100%;padding:10px;border:none;border-radius:8px;background:var(--gold);color:var(--bg);font-weight:600;font-size:14px;cursor:pointer">Войти</button>
    <div id="fb-error" style="color:var(--red);font-size:12px;margin-top:8px;text-align:center"></div>
  </div>
</div>

<script>
// ===== INIT TELEGRAM =====
var tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
var isDark = tg.colorScheme === 'dark';
if (!tg.themeParams || !tg.themeParams.bg_color) {
  tg.setHeaderColor('#0c0c0f');
  tg.setBackgroundColor('#0c0c0f');
}

// ===== CONFIG =====
var API_BASE = 'https://api.shikardos.team/api/v1';
var RATES = [127, 254, 508, 1018, 2036];
var PRICES = [5000, 10000, 20000, 40000, 80000];
var ROLE_NAMES = {maker:'Мейкер', hr:'HR-менеджер', investor:'Инвестор', blogger:'Блогер', team:'Команда', advisor:'Адвизор', founder:'Founder & CEO'};
var STATUS_NAMES = {active:'Активен', frozen:'Заморожен', pending:'Ожидание', waitlist:'В очереди'};
var initData = tg.initData || '';
var U = {}; // current user
var charts = {};

// ===== TEAM ROLE ACCESS =====
var TEAM_ROLE_ACCESS = {
  _common: ['home','shares','profile','trends','hall','tasks','kaizen','contests','referrals','settings','team-members','team-pulse','pain-points'],
  cto: ['infrastructure','ai-automators','quality','admin','content','admin-ke','risk-zone','ops-center'],
  cmo: ['content','trends','bloggers','admin'],
  cfo: ['investors','admin-shares','admin'],
  coo: ['ops-center','admin-hr','admin-makers','admin','admin-users','risk-zone'],
  hr_director: ['admin-hr','admin-makers','team-pulse','pain-points','admin'],
  pm: ['admin-makers','content','admin'],
  maker: ['home','shares','profile','videos','ke','offers','trends','hall'],
  hr: ['home','shares','profile','hr-makers','hr-review','trends','hall'],
  investor: ['home','shares','profile','portfolio','calculator','trends','hall'],
  blogger: ['home','shares','profile','publications','trends','hall']
};

function canAccess(pageId) {
  if (!U.profile) return false;
  var role = U.profile.role;
  var teamRole = U.profile.team_role || '';
  if (role === 'founder' || teamRole === 'founder' || U.profile.is_admin) return true;
  if (TEAM_ROLE_ACCESS._common.indexOf(pageId) >= 0) return true;
  if (role !== 'team' && TEAM_ROLE_ACCESS[role]) {
    if (TEAM_ROLE_ACCESS[role].indexOf(pageId) >= 0) return true;
  }
  if (role === 'team' && teamRole && TEAM_ROLE_ACCESS[teamRole]) {
    if (TEAM_ROLE_ACCESS[teamRole].indexOf(pageId) >= 0) return true;
  }
  return false;
}

// ===== HELPERS =====
function $(id) { return document.getElementById(id); }
function fmt(n) { return (n || 0).toLocaleString('en-US'); }
function fmtUSD(n) { return '$' + fmt(n); }
function fmtDate(s) { if (!s) return '—'; return new Date(s).toLocaleDateString('ru-RU'); }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtViews(n) {
  if (!n || n === 0) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
function daysUntilNewYear() {
  var now = new Date();
  var end = new Date(now.getFullYear(), 11, 31);
  if (now > end) end = new Date(now.getFullYear() + 1, 11, 31);
  return Math.ceil((end - now) / 86400000);
}


// ===== EXPORT CSV =====
function exportCSV(filename, headers, rows) {
  var csv = headers.join(',') + '\n';
  for (var i = 0; i < rows.length; i++) {
    var row = [];
    for (var j = 0; j < rows[i].length; j++) {
      var cell = String(rows[i][j] || '').replace(/"/g, '""');
      if (cell.indexOf(',') >= 0 || cell.indexOf('"') >= 0 || cell.indexOf('\n') >= 0) cell = '"' + cell + '"';
      row.push(cell);
    }
    csv += row.join(',') + '\n';
  }
  var blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('Файл ' + filename + ' скачан', 'ok');
}

async function api(path) {
  var r = await fetch(API_BASE + path, {headers: {'X-Telegram-Init-Data': initData}});
  if (!r.ok) throw new Error('API ' + r.status);
  return r.json();
}

function toast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.style.background = type === 'error' ? 'var(--red)' : type === 'warn' ? 'var(--orange)' : 'var(--green)';
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 500); }, 2500);
}

// ===== NAVIGATION =====
var currentPage = 'home';
function go(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var pg = $('pg-' + page);
  if (pg) pg.classList.add('active');
  var btns = document.querySelectorAll('.tab-btn');
  var tabMap = {home:0, shares:1, trends:2, hall:3, more:4, sub:4};
  var idx = tabMap[page];
  if (idx !== undefined && btns[idx]) btns[idx].classList.add('active');
  if (page === 'trends' && !pg.dataset.loaded) loadTrends();
  if (page === 'hall' && !pg.dataset.loaded) loadHall();
  if (page === 'more' && !pg.dataset.loaded) buildMoreMenu();
  window.scrollTo(0, 0);
}

function goSub(subId) {
  currentPage = 'sub';
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  $('pg-sub').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var btns = document.querySelectorAll('.tab-btn');
  if (btns[4]) btns[4].classList.add('active');
  loadSubPage(subId);
  window.scrollTo(0, 0);
}

// ===== HOME PAGE =====
function buildHome(profile, shares) {
  var sc = shares.shares_count || 0;
  var frozen = shares.shares_frozen;
  var role = profile.role;
  var status = profile.status || 'active';
  var h = '';

  // Welcome
  h += '<div style="font-size:14px;font-weight:600;margin-bottom:8px">Добро пожаловать, ' + esc(profile.full_name || 'Участник') + '</div>';

  // Alerts
  if (frozen) {
    h += '<div class="alert alert-danger"><i class="ti ti-alert-triangle"></i> Акции заморожены. Публикуйте видео чтобы разморозить.</div>';
  }
  if (status === 'active' && sc > 0 && !frozen) {
    h += '<div class="alert alert-success"><i class="ti ti-circle-check"></i> Всё в порядке. Система работает, акции активны.</div>';
  }

  // KPI
  h += '<div class="kpi-grid">';
  h += '<div class="kpi"><div class="val' + (frozen ? ' red' : '') + '">' + fmt(sc) + '</div><div class="lbl">Акции</div></div>';
  h += '<div class="kpi"><div class="val green">' + fmtUSD(sc * RATES[0]) + '</div><div class="lbl">Доход / мес</div><div class="sub">Год 1 — $127/акция</div></div>';
  if (role === 'maker') {
    h += '<div class="kpi"><div class="val blue" id="home-vids">—</div><div class="lbl">Видео / нед</div></div>';
    h += '<div class="kpi"><div class="val" id="home-ke" style="color:var(--gold)">—</div><div class="lbl">КЭ тир</div></div>';
  }
  h += '<div class="kpi"><div class="val">' + esc(ROLE_NAMES[role] || role) + '</div><div class="lbl">Роль</div>' + (profile.team_role ? '<div class="sub">' + esc(profile.team_role) + '</div>' : '') + '</div>';
  h += '<div class="kpi"><div class="val" style="color:' + (status === 'active' ? 'var(--green)' : 'var(--red)') + '">' + (STATUS_NAMES[status] || status) + '</div><div class="lbl">Статус</div></div>';
  h += '</div>';

  // Project stats (for founder/team/admin)
  if (role === 'founder' || role === 'team' || profile.is_admin) {

async function loadVideos(pg, back) {
  pg.innerHTML = back + '<div class="loading" style="min-height:30vh"><div class="spinner"></div></div>';
  try {
    var data = await api('/videos');
    var videos = data.items || data.videos || data || [];
    if (!Array.isArray(videos)) videos = [];

    var platforms = {};
    var weeklyCount = 0;
    var now = Date.now();
    var weekAgo = now - 7*24*3600*1000;
    var totalViews = 0;
    for (var i = 0; i < videos.length; i++) {
      var v = videos[i];
      var p = v.platform || 'Other';
      if (!platforms[p]) platforms[p] = {count:0, views:0};
      platforms[p].count++;
      platforms[p].views += (v.views || 0);
      totalViews += (v.views || 0);
      if (v.created_at && new Date(v.created_at).getTime() > weekAgo) weeklyCount++;
    }
    var total = videos.length;
    var avgViews = total > 0 ? Math.round(totalViews / total) : 0;
    var platLabels = Object.keys(platforms);

    var h = back;

    // Alert
    if (total === 0) h += '<div class="alert alert-warn"><i class="ti ti-video"></i> Вы пока не опубликовали ни одного видео.</div>';
    else if (weeklyCount < 3) h += '<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i> За эту неделю: ' + weeklyCount + '/3 видео. Минимум 3 чтобы избежать заморозки.</div>';

    // KPI
    h += '<button class="export-btn" onclick="exportVideos()"><i class="ti ti-download"></i> CSV</button>';
    h += '<div class="kpi-grid">';
    h += '<div class="kpi"><div class="val blue">' + fmt(total) + '</div><div class="lbl">Всего видео</div></div>';
    h += '<div class="kpi"><div class="val green">' + fmtViews(totalViews) + '</div><div class="lbl">Просмотры</div></div>';
    h += '<div class="kpi"><div class="val">' + fmtViews(avgViews) + '</div><div class="lbl">Среднее</div><div class="sub">просм/видео</div></div>';
    h += '<div class="kpi"><div class="val' + (weeklyCount < 3 ? ' red' : '') + '">' + weeklyCount + '/3</div><div class="lbl">За неделю</div></div>';
    h += '</div>';

    // Platform bars
    h += '<div class="card"><h3><i class="ti ti-chart-bar"></i> По платформам</h3>';
    if (platLabels.length) {
      for (var j = 0; j < platLabels.length; j++) {
        var pl = platLabels[j];
        var pct = total > 0 ? Math.round(platforms[pl].count / total * 100) : 0;
        h += '<div class="bar-row"><div class="bar-label">' + esc(pl) + '</div>';
        h += '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--gold)"></div></div>';
        h += '<div class="bar-val">' + platforms[pl].count + '</div></div>';
      }
    } else { h += '<div class="empty">Нет данных</div>'; }
    h += '</div>';

    // Distribution chart
    if (platLabels.length > 0) {
      h += '<div class="card"><h3><i class="ti ti-trending-up"></i> Распределение</h3><div class="chart-box"><canvas id="ch-platforms"></canvas></div></div>';
    }

    // Recent videos table
    var sorted = videos.slice().sort(function(a,b) { return new Date(b.created_at||0) - new Date(a.created_at||0); }).slice(0, 10);
    if (sorted.length > 0) {
      h += '<div class="card"><h3><i class="ti ti-movie"></i> Последние видео</h3><div class="m-tbl-wrap"><table class="m-tbl">';
      h += '<tr><th>Платф.</th><th>Просм.</th><th>Дата</th><th>Статус</th></tr>';
      for (var r = 0; r < sorted.length; r++) {
        var sv = sorted[r];
        var stCls = sv.status === 'verified' ? 'green' : sv.status === 'rejected' ? 'red' : 'muted';
        h += '<tr><td>' + esc(sv.platform||'—') + '</td><td>' + fmtViews(sv.views||0) + '</td><td>' + fmtDate(sv.created_at) + '</td>';
        h += '<td><span class="badge ' + stCls + '">' + esc(sv.status||'pending') + '</span></td></tr>';
      }
      h += '</table></div></div>';
    }

    pg.innerHTML = h;

    // Platform pie chart
    if (platLabels.length > 0) {
      if (charts.platforms) charts.platforms.destroy();
      var colors = ['#d4a843','#58a6ff','#3fb950','#f85149','#d6a528','#bc8cff'];
      var platCounts = [];
      for (var c = 0; c < platLabels.length; c++) platCounts.push(platforms[platLabels[c]].count);
      charts.platforms = new Chart($('ch-platforms'), {
        type: 'doughnut',
        data: {labels:platLabels, datasets:[{data:platCounts, backgroundColor:platLabels.map(function(_,i){return colors[i%colors.length];}), borderWidth:0}]},
        options: {responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{color:'#8a8a93',font:{size:10},padding:8}}}}
      });
    }
  } catch(e) { pg.innerHTML = back + '<div class="empty">Ошибка загрузки видео</div>'; }
}

async function loadTasks(pg, back) {
  pg.innerHTML = back + '<div class="loading" style="min-height:30vh"><div class="spinner"></div></div>';
  try {
    var data = await api('/team/tasks');
    var tasks = data.tasks || data || [];
    if (!Array.isArray(tasks)) tasks = [];

    var total = tasks.length;
    var done = 0, inProgress = 0, highPriority = 0;
    for (var i = 0; i < tasks.length; i++) {
      if (tasks[i].status === 'done') done++;

      if (tasks[i].priority === 'high') highPriority++;
    }
    var completionPct = total > 0 ? Math.round(done / total * 100) : 0;

    var h = back;

    // KPI
    h += '<div class="kpi-grid">';
    h += '<div class="kpi"><div class="val">' + total + '</div><div class="lbl">Всего</div></div>';
    h += '<div class="kpi"><div class="val blue">' + inProgress + '</div><div class="lbl">В работе</div></div>';
    h += '<div class="kpi"><div class="val green">' + done + '</div><div class="lbl">Выполнено</div></div>';
    h += '<div class="kpi"><div class="val red">' + highPriority + '</div><div class="lbl">Высокий приоритет</div></div>';
    h += '</div>';

    // Progress bar
    h += '<div class="card"><h3><i class="ti ti-chart-bar"></i> Прогресс</h3>';
    h += '<div style="display:flex;align-items:center;gap:8px;font-size:12px"><span style="color:var(--gold);font-weight:700">' + completionPct + '%</span>';
    h += '<div class="prog" style="flex:1"><div class="fill" style="width:' + completionPct + '%;background:var(--green)"></div></div></div>';
    h += '</div>';

    // Table
    h += '<div class="card"><h3><i class="ti ti-clipboard"></i> Задачи <button class="export-btn" onclick="exportTasks()" style="float:right"><i class="ti ti-download"></i> CSV</button></h3>';
    if (tasks.length > 0) {
      var sorted = tasks.slice().sort(function(a,b) {
        var prio = {high:0,medium:1,low:2};
        return (prio[a.priority]||2) - (prio[b.priority]||2);

        var t = sorted[j];
        var prioColor = t.priority === 'high' ? 'red' : t.priority === 'medium' ? 'orange' : 'muted';

        h += '</div><div style="display:flex;gap:4px">';
        h += '<span class="badge ' + statusColor + '">' + esc(t.status||'—') + '</span>';
        h += '<span class="badge ' + prioColor + '">' + esc(t.priority||'') + '</span>';
        h += '</div></div>';
      }
    } else { h += '<div class="empty">Нет задач</div>'; }
    h += '</div>';

    pg.innerHTML = h;
  } catch(e) { pg.innerHTML = back + '<div class="empty">Ошибка загрузки задач</div>'; }
}

  pg.innerHTML = back + '<div class="loading" style="min-height:30vh"><div class="spinner"></div></div>';
  try {
    var r = await Promise.all([
      api('/risk-zone'),
      api('/risk-zone/anomalies?status=new&limit=30').catch(function(){return {items:[],total:0};}),
      api('/risk-zone/anomalies/stats').catch(function(){return {by_type:{},by_severity:{}};})
    ]);
    var d = r[0] || {}, anom = r[1] || {}, anomStats = r[2] || {};
    var penaltyUsers = d.penalty_users||0, frozenCount = d.frozen_count||0, anomNew = d.anomalies_new||0;
    var bugsNew = d.bugs_new||0, bugsProg = d.bugs_in_progress||0, bugsTotal = d.bugs_total||0, waitlist = d.waitlist_count||0;
    var h = back;

    h += '<div class="card" style="border-left:3px solid var(--red)"><div style="font-size:12px;color:var(--text)"><i class="ti ti-alert-triangle"></i> <b>Зона риска</b> · мониторинг через Apify · триггер замены: &lt;6 видео/нед 3 нед подряд · очередь: ' + fmt(waitlist) + '</div></div>';

    // KPI
    h += '<div class="kpi-grid">';
    h += '<div class="kpi"><div class="val red">' + fmt(penaltyUsers) + '</div><div class="lbl">Кандидаты на замену</div></div>';
    h += '<div class="kpi"><div class="val" style="color:var(--orange)">' + fmt(bugsNew+bugsProg) + '</div><div class="lbl">Предупреждения</div></div>';
    h += '<div class="kpi"><div class="val blue">' + fmt(waitlist) + '</div><div class="lbl">Очередь ожидания</div></div>';
    h += '<div class="kpi"><div class="val" style="color:var(--purple)">' + fmt(anomNew) + '</div><div class="lbl">AI-флаги</div></div>';
    h += '<div class="kpi"><div class="val green">' + fmt(frozenCount) + '</div><div class="lbl">Замен/мес</div></div>';
    h += '</div>';

    // Воронка деградации
    function fbar(label, color, val, total) {
      var pct = total>0 ? Math.round(val/total*100) : 0;
      return '<div class="bar-row"><span style="min-width:130px;font-size:12px">' + label + '</span>' +
        '<div style="flex:1;background:var(--border);border-radius:4px;height:16px;overflow:hidden"><div style="width:' + pct + '%;background:' + color + ';height:100%;border-radius:4px;min-width:' + (val>0?'2':'0') + 'px"></div></div>' +
        '<span style="min-width:36px;text-align:right;font-size:12px">' + fmt(val) + '</span></div>';
    }
    var tot = d.stats_total||0;
    h += '<div class="card"><h3><i class="ti ti-trending-down"></i> Воронка деградации</h3>';
    h += fbar('<i class="ti ti-point-filled" style="color:var(--green)"></i> Норма (12+)', 'var(--green)', d.stats_normal||0, tot||1);
    h += fbar('<i class="ti ti-point-filled" style="color:#e3b341"></i> Внимание (9-11)', '#e3b341', d.stats_attention||0, tot||1);
    h += fbar('<i class="ti ti-point-filled" style="color:var(--orange)"></i> Предупр. (6-8)', 'var(--orange)', d.stats_warning||0, tot||1);
    h += fbar('<i class="ti ti-point-filled" style="color:var(--red)"></i> Критично (1-5)', 'var(--red)', d.stats_critical||0, tot||1);
    h += fbar('<i class="ti ti-point-filled" style="color:var(--hint)"></i> Тишина (0)', 'var(--hint)', d.stats_silence||0, tot||1);
    h += '<div style="margin-top:10px;font-size:11px;color:var(--hint)"><i class="ti ti-bulb"></i> Apify парсит 4 платформы еженедельно. &lt;6 видео/нед 3 нед подряд → статус "Замена".</div></div>';

    // Топ критичных
    var frozen = d.frozen||[];
    h += '<div class="card"><h3><i class="ti ti-point-filled" style="color:var(--red)"></i> Топ критичных · замена</h3>';
    if (frozen.length) {
      frozen.slice(0,10).forEach(function(u){
        h += '<div class="list-item"><div><div style="font-size:12px">' + esc(u.full_name||u.username||'—') + '</div><div style="font-size:10px;color:var(--hint)">' + fmt(u.penalty_shares||0) + ' штраф · ' + fmt(u.shares_count||0) + ' акц.</div></div><span class="badge" style="background:rgba(248,81,73,0.15);color:var(--red)"><i class="ti ti-snowflake"></i> -' + (u.penalty_shares||0) + '</span></div>';
      });
    } else { h += '<div class="empty">Нет критичных мейкеров</div>'; }
    h += '</div>';

    // AI-флаги
    var items = anom.items||[];
    var typeLabels = {views_spike:'Спайк просмотров',low_engagement:'Низкий ER',mass_upload:'Масс-заливка',inactive_14d:'Неактивен',views_drop:'Падение просм.',foreign_link:'Чужая ссылка'};
    h += '<div class="card"><h3><i class="ti ti-robot"></i> AI-флаги накруток <span style="font-size:11px;color:var(--hint);font-weight:400">' + fmt(anom.total||0) + ' кейсов</span></h3>';
    if (items.length) {
      items.slice(0,8).forEach(function(a){
        var sc = a.severity==='red'?'var(--red)':a.severity==='orange'?'var(--orange)':'#e3b341';
        h += '<div class="list-item"><div style="flex:1"><div style="font-size:12px"><i class="ti ti-point-filled" style="color:' + sc + '"></i> ' + esc(a.maker_name||'—') + '</div><div style="font-size:10px;color:var(--hint)">' + (typeLabels[a.anomaly_type]||a.anomaly_type) + ' · ' + esc((a.description||'').substring(0,50)) + '</div></div><button onclick="resolveAnomaly(' + a.id + ')" class="badge" style="border:none;cursor:pointer;background:var(--card);color:var(--text)"><i class="ti ti-circle-check"></i></button></div>';
      });
    } else { h += '<div class="empty">Нет аномалий</div>'; }
    // by_type bars
    var bt = anomStats.by_type||{}, btk = Object.keys(bt), mx=1;
    btk.forEach(function(k){ if(bt[k]>mx) mx=bt[k]; });
    if (btk.length) {
      h += '<div style="margin-top:8px">';
      var bc = ['var(--red)','var(--orange)','var(--purple)','var(--hint)','var(--blue)','var(--green)'];
      btk.forEach(function(k,i){
        var pct = Math.round(bt[k]/mx*100);
        h += '<div class="bar-row"><span style="min-width:120px;font-size:11px">' + (typeLabels[k]||k) + '</span><div style="flex:1;background:var(--border);border-radius:4px;height:14px;overflow:hidden"><div style="width:' + pct + '%;background:' + bc[i%bc.length] + ';height:100%;border-radius:4px;min-width:2px"></div></div><span style="min-width:26px;text-align:right;font-size:11px">' + bt[k] + '</span></div>';
      });
      h += '</div>';
    }
    h += '</div>';

    // Баги
    var bugs = d.bugs||[];
    var bSt = {'new':'<i class="ti ti-point-filled" style="color:var(--green)"></i> Новый','in_progress':'В работе','resolved':'<i class="ti ti-circle-check"></i> Решён','dismissed':'<i class="ti ti-x"></i> Отклонён'};
    h += '<div class="card"><h3><i class="ti ti-bug"></i> Баги <span style="font-size:11px;color:var(--hint);font-weight:400">(' + bugsTotal + ')</span></h3>';
    if (bugs.length) {
      bugs.forEach(function(b){
        h += '<div class="list-item"><div style="flex:1;font-size:12px">' + esc((b.text||'').substring(0,60)) + (b.escalated?' <i class="ti ti-alert-octagon"></i>':'') + '</div><span style="font-size:11px;white-space:nowrap">' + (bSt[b.status]||b.status) + '</span></div>';
      });
    } else { h += '<div class="empty">Нет багов</div>'; }
    h += '</div>';

    // Замороженные
    h += '<div class="card"><h3><i class="ti ti-snowflake"></i> Замороженные <span style="font-size:11px;color:var(--hint);font-weight:400">(' + frozenCount + ')</span></h3>';
    if (frozen.length) {
      frozen.forEach(function(u){
        h += '<div class="list-item"><span style="font-size:12px"><i class="ti ti-snowflake"></i> ' + esc(u.full_name||'—') + '</span><span style="font-size:11px;color:var(--red)">-' + (u.penalty_shares||0) + ' · ' + (u.shares_count||0) + ' акц.</span></div>';
      });
    } else { h += '<div class="empty">Нет замороженных</div>'; }
    h += '</div>';

    // Процедура списания
    var steps = [
      ['01','var(--red)','Нет ссылок за неделю → заморозка','Бот убирает ссылку из ротации, акции заморожены, доход = 0'],
      ['02','var(--orange)','Уведомления с альтернативами','Работай сам / найми подрядчика / продай акции'],
      ['03','var(--gold)','Каждый месяц простоя = -1 акция','Списывается с баланса безвозвратно'],
      ['04','var(--blue)','0 акций = выход из системы','Место передаётся новому мейкеру из очереди'],
      ['05','var(--green)','Возврат в любой момент','Скинул ссылки → разморозка, доход восстанавливается']
    ];
    h += '<div class="card"><h3><i class="ti ti-clipboard"></i> Процедура списания <span style="font-size:11px;color:var(--hint);font-weight:400">-1 акция/мес</span></h3>';
    steps.forEach(function(st){
      h += '<div class="list-item" style="align-items:flex-start"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:' + st[1] + ';min-width:26px">' + st[0] + '</div><div><div style="font-size:12px;font-weight:600">' + st[2] + '</div><div style="font-size:10px;color:var(--hint)">' + st[3] + '</div></div></div>';
    });
    h += '<div style="margin-top:8px;font-size:11px;color:var(--text)"><i class="ti ti-alert-triangle"></i> Исключение: подтверждённая мед. ситуация. Механика одинакова для всех.</div></div>';

    pg.innerHTML = h;
  } catch(e) { console.error('risk', e); pg.innerHTML = back + '<div class="empty"><i class="ti ti-alert-triangle"></i> Ошибка загрузки зоны риска</div>'; }
}

async function resolveAnomaly(flagId) {
  try {
    await api('/risk-zone/anomalies/' + flagId + '/resolve', 'POST', {action:'resolved', comment:'Closed from webapp'});
    if (typeof toast === 'function') toast('Флаг закрыт');
    loadSubPage('risk');
  } catch(e) { if (typeof toast === 'function') toast('Ошибка', 'error'); }
}

// ===== EMAIL FALLBACK AUTH =====
async function emailFallbackLogin() {
  var email = document.getElementById('fb-email').value.trim();
  var password = document.getElementById('fb-password').value;
  var errEl = document.getElementById('fb-error');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Введите email и пароль'; return; }
  try {
    var resp = await fetch(API_BASE + '/auth/email-login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: email, password: password})
    });
    var data = await resp.json();
    if (!resp.ok) { errEl.textContent = data.detail || 'Ошибка'; return; }
    // Got JWT — use it for all API calls
    initData = '';
    var jwtToken = data.token;
    // Override api function to use JWT
    window._origApi = api;
    api = async function(path, method, body) {
      if (typeof method === 'object') { body = method; method = 'POST'; }
      var opts = { method: method || 'GET', headers: {'Authorization': 'Bearer ' + jwtToken} };
      if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      var r = await fetch(API_BASE + path, opts);
      if (!r.ok) throw new Error('API ' + r.status);
      return r.json();
    };
    // Re-init with JWT auth
    var res = await Promise.all([api('/profile'), api('/shares')]);
    var profile = res[0];
    var shares = res[1];
    U = {profile: profile, shares: shares};
    $('hd-avatar').textContent = (profile.full_name || '?')[0].toUpperCase();
    $('hd-name').textContent = profile.full_name || 'Участник';
    var roleLabel = ROLE_NAMES[profile.role] || profile.role;
    if (profile.team_role && profile.role === 'team') {
      var trMap = {cto:'CTO',cmo:'CMO',cfo:'CFO',coo:'COO',hr_director:'HR Dir',pm:'PM',founder:'Founder'};
      roleLabel = trMap[profile.team_role] || roleLabel;
    }
    if (profile.role === 'founder') roleLabel = 'Founder & CEO';
    $('hd-role').textContent = roleLabel;
    $('hd-dot').classList.add(profile.status === 'active' ? 'ok' : 'bad');
    buildHome(profile, shares);
    buildShares(shares);
    $('app-error').style.display = 'none';
    $('app').style.display = 'block';
  } catch(e) { errEl.textContent = e.message || 'Ошибка подключения'; }
}

async function init() {
  try {
    if (!initData && !tg.initDataUnsafe.user) throw new Error('Откройте через Telegram бот');
    var res = await Promise.all([api('/profile'), api('/shares')]);
    var profile = res[0];
    var shares = res[1];
    U = {profile: profile, shares: shares};
    $('hd-avatar').textContent = (profile.full_name || '?')[0].toUpperCase();
    $('hd-name').textContent = profile.full_name || 'Участник';
    var roleLabel = ROLE_NAMES[profile.role] || profile.role;
    if (profile.team_role && profile.role === 'team') {
      var trMap = {cto:'CTO',cmo:'CMO',cfo:'CFO',coo:'COO',hr_director:'HR Dir',pm:'PM',founder:'Founder'};
      roleLabel = trMap[profile.team_role] || roleLabel;
    }
    if (profile.role === 'founder') roleLabel = 'Founder & CEO';
    $('hd-role').textContent = roleLabel;
    $('hd-dot').classList.add(profile.status === 'active' ? 'ok' : 'bad');
    buildHome(profile, shares);

  }
}
init();
