<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shikardos Team</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ===== ADAPTIVE THEME (Telegram CSS vars with fallbacks) ===== */
:root {
  --bg: var(--tg-theme-bg-color, #0d1117);
  --card: var(--tg-theme-secondary-bg-color, #161b22);
  --text: var(--tg-theme-text-color, #e6edf3);
  --hint: var(--tg-theme-hint-color, #8b949e);
  --link: var(--tg-theme-link-color, #58a6ff);
  --btn: var(--tg-theme-button-color, #d4a843);
  --btn-text: var(--tg-theme-button-text-color, #0d1117);
  --border: rgba(128,128,128,0.15);
  --gold: #d4a843;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --orange: #d29922;
  --purple: #bc8cff;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 68px;
  -webkit-tap-highlight-color: transparent;
}

/* ===== LOADING / ERROR ===== */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; gap:16px; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg) } }
.error-screen { text-align:center; padding:60px 20px; }

/* ===== HEADER ===== */
.header {
  display:flex; align-items:center; gap:12px; padding:12px 16px;
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
  background:var(--bg);
}
.avatar {
  width:40px; height:40px; border-radius:50%; background:var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:17px; font-weight:700; color:var(--bg); flex-shrink:0;
}
.user-info { flex:1; min-width:0; }
.user-info h2 { font-size:15px; font-weight:600; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.user-info .sub { font-size:11px; color:var(--hint); display:flex; align-items:center; gap:4px; }
.role-tag {
  display:inline-block; padding:1px 6px; border-radius:8px;
  font-size:10px; font-weight:600; background:rgba(212,168,67,0.12); color:var(--gold);
}
.dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
.dot.ok { background:var(--green); }
.dot.bad { background:var(--red); }

/* ===== BOTTOM TAB BAR ===== */
.tab-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:var(--card); border-top:1px solid var(--border);
  display:flex; padding:2px 0 env(safe-area-inset-bottom);
}
.tab-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:6px 2px; font-size:9px; color:var(--hint);
  background:none; border:none; cursor:pointer; gap:1px;
  transition: color 0.15s;
}
.tab-btn.active { color:var(--gold); }
.tab-btn .ico { font-size:20px; line-height:1.2; }

/* ===== PAGES ===== */
.page { display:none; padding:12px 14px; }
.page.active { display:block; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* ===== CARDS ===== */
.kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.kpi-grid.three { grid-template-columns:1fr 1fr 1fr; }
.kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px; }
.kpi .val { font-size:20px; font-weight:700; color:var(--gold); }
.kpi .val.green { color:var(--green); }
.kpi .val.red { color:var(--red); }
.kpi .val.blue { color:var(--blue); }
.kpi .lbl { font-size:10px; color:var(--hint); margin-top:2px; }

.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:12px; margin-bottom:10px;
}
.card h3 { font-size:13px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:5px; }

.row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:12px; }
.row .lbl { color:var(--hint); }
.row .val { font-weight:600; }

.list-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 0; border-bottom:1px solid var(--border); font-size:12px;
}
.list-item:last-child { border-bottom:none; }

.badge { display:inline-block; padding:2px 6px; border-radius:6px; font-size:10px; font-weight:600; }
.badge.green { background:rgba(63,185,80,0.12); color:var(--green); }
.badge.red { background:rgba(248,81,73,0.12); color:var(--red); }
.badge.orange { background:rgba(210,153,34,0.12); color:var(--orange); }
.badge.blue { background:rgba(88,166,255,0.12); color:var(--blue); }
.badge.gold { background:rgba(212,168,67,0.12); color:var(--gold); }

.empty { text-align:center; padding:20px; color:var(--hint); font-size:12px; }

/* Chart */
.chart-box { position:relative; width:100%; height:160px; }

/* Leaderboard */
.lb-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
.lb-row:last-child { border-bottom:none; }
.lb-rank { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
.lb-rank.g { background:rgba(212,168,67,0.2); color:var(--gold); }
.lb-rank.s { background:rgba(139,148,158,0.2); color:var(--hint); }
.lb-rank.b { background:rgba(210,153,34,0.15); color:var(--orange); }
.lb-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-val { font-weight:700; color:var(--gold); }

/* Progress bar */
.prog { width:100%; height:5px; background:var(--border); border-radius:3px; overflow:hidden; margin:5px 0; }
.prog .fill { height:100%; border-radius:3px; transition:width 0.5s; }

/* More menu grid */
.more-grid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; padding:4px;
}
.more-item {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:14px 6px; background:var(--card); border:1px solid var(--border);
  border-radius:12px; cursor:pointer; font-size:11px; color:var(--text);
  transition: background 0.15s;
}
.more-item:active { background:var(--border); }
.more-item .mi { font-size:24px; }
.more-back {
  display:flex; align-items:center; gap:6px; padding:10px 0; margin-bottom:8px;
  font-size:13px; color:var(--link); cursor:pointer; font-weight:600;
}

/* Income table */
.inc-tbl { width:100%; font-size:12px; border-collapse:collapse; }
.inc-tbl td { padding:3px 4px; border-bottom:1px solid var(--border); }
.inc-tbl td:last-child { text-align:right; font-weight:600; color:var(--gold); }

/* Bar chart row */
.bar-row { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:11px; }
.bar-label { width:70px; color:var(--hint); flex-shrink:0; }
.bar-track { flex:1; height:14px; background:var(--border); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; }
.bar-val { width:36px; text-align:right; font-weight:600; font-size:11px; }

/* Toast */
.toast {
  position:fixed; top:12px; left:50%; transform:translateX(-50%); z-index:9999;
  padding:8px 16px; border-radius:8px; color:#fff; font-size:12px; font-weight:600;
  box-shadow:0 4px 16px rgba(0,0,0,0.3); transition:opacity 0.5s;
}
</style>
</head>
<body>

<div id="app-loading" class="loading">
  <div class="spinner"></div>
  <div style="color:var(--hint);font-size:13px">Загрузка...</div>
</div>

<div id="app" style="display:none">
  <!-- HEADER -->
  <div class="header">
    <div class="avatar" id="hd-avatar">?</div>
    <div class="user-info">
      <h2 id="hd-name">—</h2>
      <div class="sub"><span class="role-tag" id="hd-role">—</span><span class="dot" id="hd-dot"></span></div>
    </div>
  </div>

  <!-- PAGE: HOME -->
  <div id="pg-home" class="page active"></div>
  <!-- PAGE: SHARES -->
  <div id="pg-shares" class="page"></div>
  <!-- PAGE: TRENDS -->
  <div id="pg-trends" class="page"></div>
  <!-- PAGE: HALL -->
  <div id="pg-hall" class="page"></div>
  <!-- PAGE: MORE (menu) -->
  <div id="pg-more" class="page"></div>
  <!-- PAGE: SUB-PAGES (from More) -->
  <div id="pg-sub" class="page"></div>

  <!-- BOTTOM TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="go('home')"><span class="ico">🏠</span>Главная</button>
    <button class="tab-btn" onclick="go('shares')"><span class="ico">💎</span>Акции</button>
    <button class="tab-btn" onclick="go('trends')"><span class="ico">📈</span>Тренды</button>
    <button class="tab-btn" onclick="go('hall')"><span class="ico">🏆</span>Зал</button>
    <button class="tab-btn" onclick="go('more')"><span class="ico">⚙️</span>Ещё</button>
  </div>
</div>

<div id="app-error" class="error-screen" style="display:none">
  <div style="font-size:48px;margin-bottom:12px">⚠️</div>
  <div style="font-size:15px;font-weight:600;margin-bottom:6px">Ошибка</div>
  <div id="err-text" style="color:var(--hint);font-size:13px">—</div>
</div>

<script>
// ===== INIT TELEGRAM =====
var tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
var isDark = tg.colorScheme === 'dark';
if (!tg.themeParams || !tg.themeParams.bg_color) {
  // No theme from TG — set our defaults
  tg.setHeaderColor('#0d1117');
  tg.setBackgroundColor('#0d1117');
}

// ===== CONFIG =====
var API_BASE = 'https://worker-production-26d0.up.railway.app/api/v1';
var RATES = [127, 254, 508, 1018, 2036];
var PRICES = [5000, 10000, 20000, 40000, 80000];
var ROLE_NAMES = {maker:'Мейкер', hr:'HR-менеджер', investor:'Инвестор', blogger:'Блогер', team:'Команда', advisor:'Адвизор', founder:'Founder & CEO'};
var STATUS_NAMES = {active:'Активен', frozen:'Заморожен', pending:'Ожидание', waitlist:'В очереди'};
var initData = tg.initData || '';
var U = {}; // current user
var charts = {};

// ===== HELPERS =====
function $(id) { return document.getElementById(id); }
function fmt(n) { return (n || 0).toLocaleString('en-US'); }
function fmtUSD(n) { return '$' + fmt(n); }
function fmtDate(s) { if (!s) return '—'; return new Date(s).toLocaleDateString('ru-RU'); }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function api(path) {
  var r = await fetch(API_BASE + path, {headers: {'X-Telegram-Init-Data': initData}});
  if (!r.ok) throw new Error('API ' + r.status);
  return r.json();
}

function toast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.style.background = type === 'error' ? 'var(--red)' : type === 'warn' ? 'var(--orange)' : 'var(--green)';
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 500); }, 2500);
}

// ===== NAVIGATION =====
var currentPage = 'home';
function go(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var pg = $('pg-' + page);
  if (pg) pg.classList.add('active');
  // Highlight tab
  var btns = document.querySelectorAll('.tab-btn');
  var tabMap = {home:0, shares:1, trends:2, hall:3, more:4, sub:4};
  var idx = tabMap[page];
  if (idx !== undefined && btns[idx]) btns[idx].classList.add('active');
  // Lazy load
  if (page === 'trends' && !pg.dataset.loaded) loadTrends();
  if (page === 'hall' && !pg.dataset.loaded) loadHall();
  if (page === 'more' && !pg.dataset.loaded) buildMoreMenu();
  // Scroll to top
  window.scrollTo(0, 0);
}

function goSub(subId) {
  currentPage = 'sub';
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  $('pg-sub').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var btns = document.querySelectorAll('.tab-btn');
  if (btns[4]) btns[4].classList.add('active');
  loadSubPage(subId);
  window.scrollTo(0, 0);
}

// ===== HOME PAGE =====
function buildHome(profile, shares) {
  var sc = shares.shares_count || 0;
  var frozen = shares.shares_frozen;
  var role = profile.role;
  var h = '';

  // KPI
  h += '<div class="kpi-grid">';
  h += '<div class="kpi"><div class="val' + (frozen ? ' red' : '') + '">' + fmt(sc) + '</div><div class="lbl">Акции</div></div>';
  h += '<div class="kpi"><div class="val">' + fmtUSD(sc * RATES[0]) + '</div><div class="lbl">Доход / мес</div></div>';
  if (role === 'maker') {
    h += '<div class="kpi"><div class="val blue" id="home-vids">—</div><div class="lbl">Видео / нед</div></div>';
    h += '<div class="kpi"><div class="val green" id="home-ke">—</div><div class="lbl">КЭ тир</div></div>';
  }
  h += '</div>';

  // Frozen alert
  if (frozen) {
    h += '<div class="card" style="border-color:var(--red)"><div style="color:var(--red);font-weight:600;font-size:13px">❄️ Акции заморожены</div><div style="font-size:11px;color:var(--hint);margin-top:3px">Доход = $0. Загрузите видео.</div></div>';
  }

  // Income chart
  h += '<div class="card"><h3>📊 Прогноз дохода</h3><div class="chart-box"><canvas id="ch-income"></canvas></div>';
  h += '<table class="inc-tbl" style="margin-top:6px">';
  for (var i = 0; i < 5; i++) h += '<tr><td>Год ' + (i+1) + '</td><td>' + fmtUSD(sc * RATES[i]) + '/мес</td></tr>';
  h += '</table></div>';

  // Project stats
  h += '<div class="card"><h3>📈 Проект</h3>';
  h += '<div class="row"><span class="lbl">Участников</span><span class="val" id="home-users">—</span></div>';
  h += '<div class="row"><span class="lbl">Мейкеров</span><span class="val" id="home-makers">—</span></div>';
  h += '<div class="row"><span class="lbl">Видео/нед</span><span class="val" id="home-videos-total">—</span></div>';
  h += '<div class="row"><span class="lbl">Офферов</span><span class="val" id="home-offers">—</span></div>';
  h += '</div>';

  $('pg-home').innerHTML = h;

  // Chart
  if (charts.income) charts.income.destroy();
  charts.income = new Chart($('ch-income'), {
    type: 'bar',
    data: {labels:['Г1','Г2','Г3','Г4','Г5'], datasets:[{data:RATES.map(function(r){return sc*r;}), backgroundColor:'#d4a843', borderRadius:6}]},
    options: {responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#8b949e',font:{size:10}},grid:{display:false}},
              y:{ticks:{color:'#8b949e',font:{size:9},callback:function(v){return v>=1000?'$'+Math.round(v/1000)+'K':'$'+v;}},grid:{color:'rgba(128,128,128,0.1)'}}}}
  });

  // Maker-specific
  if (role === 'maker') {
    api('/maker/videos').then(function(v) { $('home-vids').textContent = (v.this_week_count||0)+'/12'; }).catch(function(){});
    api('/maker/ke').then(function(k) { $('home-ke').textContent = k.tier ? 'T'+k.tier : '—'; }).catch(function(){});
  }

  // Project stats
  api('/stats/project').then(function(s) {
    $('home-users').textContent = fmt(s.total_users || 0);
    $('home-makers').textContent = fmt(s.total_makers || 0);
    $('home-videos-total').textContent = fmt(s.videos_this_week || 0);
    $('home-offers').textContent = s.total_offers || 0;
  }).catch(function(){});
}

// ===== SHARES PAGE =====
function buildShares(shares) {
  var sc = shares.shares_count || 0;
  var frozen = shares.shares_frozen;
  var h = '';

  h += '<div class="kpi-grid">';
  h += '<div class="kpi"><div class="val' + (frozen?' red':'') + '">' + fmt(sc) + '</div><div class="lbl">Баланс акций</div></div>';
  h += '<div class="kpi"><div class="val">' + fmtUSD(sc * RATES[0]) + '</div><div class="lbl">Доход / мес</div></div>';
  h += '</div>';

  // Rotation
  h += '<div class="card"><h3>🔄 Ротация</h3><div id="sh-rot"></div></div>';

  // History
  h += '<div class="card"><h3>📜 Транзакции</h3><div id="sh-hist"><div class="empty">Загрузка...</div></div></div>';

  // SaaS
  h += '<div class="card"><h3>📦 SaaS ссылки</h3><div id="sh-saas"><div class="empty">Загрузка...</div></div></div>';

  $('pg-shares').innerHTML = h;

  // Load rotation
  api('/offers').then(function(o) {
    var items = o.items || [];
    var filled = items.filter(function(i){return i.my_link;}).length;
    var inR = filled >= items.length && items.length > 0;
    var rH = '<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;font-size:12px;font-weight:600;background:' + (inR?'rgba(63,185,80,0.1)':'rgba(248,81,73,0.1)') + ';color:' + (inR?'var(--green)':'var(--red)') + '">' + (inR?'✅ В ротации':'❌ Не в ротации') + '</div>';
    rH += '<div style="margin-top:6px"><div class="row"><span class="lbl">Заполнено</span><span class="val">' + filled + '/' + items.length + '</span></div>';
    rH += '<div class="prog"><div class="fill" style="width:' + (items.length>0?Math.round(filled/items.length*100):0) + '%;background:var(--green)"></div></div></div>';
    $('sh-rot').innerHTML = rH;

    var sl = '';
    items.forEach(function(i) { sl += '<div class="list-item"><span>' + (i.my_link?'✅':'❌') + ' ' + esc(i.name) + '</span></div>'; });
    $('sh-saas').innerHTML = sl || '<div class="empty">Нет офферов</div>';
  }).catch(function() { $('sh-rot').innerHTML = '<div class="empty">—</div>'; });

  // History
  api('/shares/history').then(function(h) {
    if (h.items && h.items.length) {
      var hl = '';
      h.items.forEach(function(t) {
        var sign = t.amount > 0 ? '+' : '';
        var color = t.amount > 0 ? 'var(--green)' : 'var(--red)';
        hl += '<div class="list-item"><div><div style="font-weight:600;font-size:12px">' + esc(t.reason) + '</div><div style="font-size:10px;color:var(--hint)">' + fmtDate(t.created_at) + '</div></div><span style="color:' + color + ';font-weight:700">' + sign + t.amount + '</span></div>';
      });
      $('sh-hist').innerHTML = hl;
    } else {
      $('sh-hist').innerHTML = '<div class="empty">Нет транзакций</div>';
    }
  }).catch(function() { $('sh-hist').innerHTML = '<div class="empty">—</div>'; });
}

// ===== TRENDS PAGE =====
async function loadTrends() {
  var pg = $('pg-trends');
  pg.innerHTML = '<div class="loading" style="min-height:40vh"><div class="spinner"></div></div>';
  try {
    var d = await api('/trends');
    var h = '';

    // KPI
    h += '<div class="kpi-grid three">';
    h += '<div class="kpi"><div class="val gold">' + fmt(d.top5_percent||0) + '</div><div class="lbl">Top 5%</div></div>';
    h += '<div class="kpi"><div class="val blue">' + fmt(d.avg_views_top5||0) + '</div><div class="lbl">Ср.просм. top5</div></div>';
    h += '<div class="kpi"><div class="val green">' + fmt(d.templates_count||0) + '</div><div class="lbl">Шаблонов</div></div>';
    h += '</div>';

    // Top videos
    var vids = d.top_videos || [];
    h += '<div class="card"><h3>🎬 Топ видео</h3>';
    if (vids.length) {
      vids.forEach(function(v, i) {
        h += '<div class="list-item"><div><span style="color:var(--gold);font-weight:700">#' + (i+1) + '</span> ' + esc(v.maker||'—') + '<div style="font-size:10px;color:var(--hint)">' + esc(v.platform||'') + ' · ' + esc(v.niche||'') + '</div></div><span style="font-weight:700">' + fmt(v.views||0) + '</span></div>';
      });
    } else {
      h += '<div class="empty">Нет данных</div>';
    }
    h += '</div>';

    // Best posting times
    var times = d.best_posting_times || [];
    if (times.length) {
      h += '<div class="card"><h3>⏰ Лучшее время</h3>';
      times.forEach(function(t) {
        h += '<div class="row"><span class="lbl">' + esc(t.platform) + '</span><span class="val" style="color:var(--blue)">' + esc(t.time) + '</span><span style="color:var(--green);font-size:11px">' + esc(String(t.boost||'')) + '</span></div>';
      });
      h += '</div>';
    }

    // Viral patterns
    var pats = d.viral_patterns || [];
    if (pats.length) {
      h += '<div class="card"><h3>🧬 Виральные паттерны</h3>';
      pats.forEach(function(p) {

// ===== HALL OF FAME =====
async function loadHall() {
  var pg = $('pg-hall');
  pg.innerHTML = '<div class="loading" style="min-height:40vh"><div class="spinner"></div></div>';
  try {
    var d = await api('/hall-of-fame');
    var h = '';

    // Shares leaderboard
    var ts = d.top_shares || d.top_by_shares || [];
    if (ts.length) {
      h += '<div class="card"><h3>💰 Топ по акциям</h3>';
      ts.forEach(function(u, i) {
        var cls = i === 0 ? 'g' : i === 1 ? 's' : i === 2 ? 'b' : '';
        var me = u.is_me ? ' style="color:var(--gold)"' : '';
        h += '<div class="lb-row"><div class="lb-rank ' + cls + '">' + (i+1) + '</div><div class="lb-name"' + me + '>' + esc(u.full_name||'—') + '</div><div class="lb-val">' + (u.shares_count||0) + '</div></div>';
      });
      h += '</div>';
    }

    // Videos leaderboard
    var tv = d.top_videos_this_week || d.top_by_videos || [];
    if (tv.length) {
      h += '<div class="card"><h3>🎥 Топ по видео (неделя)</h3>';
      tv.forEach(function(u, i) {
        var cls = i === 0 ? 'g' : i === 1 ? 's' : i === 2 ? 'b' : '';
        h += '<div class="lb-row"><div class="lb-rank ' + cls + '">' + (i+1) + '</div><div class="lb-name">' + esc(u.full_name||'—') + '</div><div class="lb-val">' + (u.videos_this_week || u.video_count || 0) + '</div></div>';
      });
      h += '</div>';
    }

    // My rank
    if (d.my_rank) {
      h += '<div class="card" style="text-align:center"><span style="font-size:13px">📍 Ваше место: <strong style="color:var(--gold)">#' + d.my_rank + '</strong></span></div>';

    pg.innerHTML = h;
    pg.dataset.loaded = '1';
  } catch(e) {
    pg.innerHTML = '<div class="empty">Ошибка загрузки</div>';
  }

// ===== MORE MENU =====
function buildMoreMenu() {
  var pg = $('pg-more');
  var items = [
    {id:'profile', ico:'👤', name:'Профиль'},
    {id:'kaizen', ico:'💡', name:'Кайдзен'},
    {id:'contests', ico:'🏅', name:'Конкурсы'},
    {id:'referrals', ico:'🔗', name:'Рефералы'}
  ];

  // Role-specific
  var role = U.profile ? U.profile.role : '';
  var teamRole = U.profile ? (U.profile.team_role || '') : '';
  var isAdmin = U.profile ? U.profile.is_admin : false;

  if (role === 'maker') {
    items.push({id:'videos', ico:'📹', name:'Видео'});
    items.push({id:'ke', ico:'⚡', name:'КЭ'});
    items.push({id:'offers', ico:'🔗', name:'Офферы'});
  }
  if (role === 'hr' || teamRole === 'hr' || teamRole === 'hr_director') {
    items.push({id:'hr-makers', ico:'👥', name:'Мои мейкеры'});
  }
  if (role === 'investor') {
    items.push({id:'portfolio', ico:'💼', name:'Портфель'});
  }
  if (role === 'blogger') {
    items.push({id:'publications', ico:'📝', name:'Публикации'});

  if (isAdmin || role === 'founder' || teamRole === 'founder') {
    items.push({id:'admin', ico:'🔧', name:'Админ'});
    items.push({id:'risk', ico:'⚠️', name:'Риски'});
    items.push({id:'infra', ico:'🖥️', name:'Инфра'});
  }

  var h = '<div style="font-size:14px;font-weight:600;padding:4px 0 8px">Разделы</div>';

  items.forEach(function(it) {
    h += '<div class="more-item" onclick="goSub(\'' + it.id + '\')" ><span class="mi">' + it.ico + '</span>' + it.name + '</div>';

}

// ===== INIT =====
async function init() {
  try {
    if (!initData && !tg.initDataUnsafe.user) throw new Error('Откройте через Telegram бот');
    var res = await Promise.all([api('/profile'), api('/shares')]);
    var profile = res[0];
    var shares = res[1];
    U = {profile: profile, shares: shares};

    // Header
    $('hd-avatar').textContent = (profile.full_name || '?')[0].toUpperCase();
    $('hd-name').textContent = profile.full_name || 'Участник';
    var roleLabel = ROLE_NAMES[profile.role] || profile.role;
    if (profile.team_role && profile.role === 'team') {
      var trMap = {cto:'CTO',cmo:'CMO',cfo:'CFO',coo:'COO',hr_director:'HR Dir',pm:'PM',founder:'Founder'};
      roleLabel = trMap[profile.team_role] || roleLabel;
    }
    if (profile.role === 'founder') roleLabel = 'Founder & CEO';
    $('hd-role').textContent = roleLabel;
    $('hd-dot').classList.add(profile.status === 'active' ? 'ok' : 'bad');

    // Build pages
    buildHome(profile, shares);
    buildShares(shares);

    $('app-loading').style.display = 'none';
    $('app').style.display = 'block';

    // Haptic
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  } catch(err) {
    $('app-loading').style.display = 'none';
    $('app-error').style.display = 'block';
    $('err-text').textContent = err.message || 'Ошибка';
  }
}
init();
</script>
