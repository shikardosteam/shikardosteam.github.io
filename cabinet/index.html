<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shikardos Team — Личный кабинет</title>
<link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script async src="https://telegram.org/js/telegram-widget.js?22"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --gold: #d4a843;
  --gold-dim: rgba(212,168,67,0.12);
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --orange: #d29922;
  --purple: #bc8cff;
  --sidebar-w: 240px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Manrope',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; min-height:100vh; }

/* ===== TYPOGRAPHY ===== */
h1,h2,h3,.stat-value,.section-title { font-family:'Bebas Neue',sans-serif; letter-spacing:1.5px; }
h1 { font-size:28px; color:var(--gold); }
h2 { font-size:22px; color:var(--text); }
h3 { font-size:18px; }
.section-title { font-size:26px; color:var(--gold); margin-bottom:20px; letter-spacing:2px; }

/* ===== AUTH SCREEN ===== */
#auth-screen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:20px;
}
.auth-container {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:48px 40px; max-width:420px; width:100%;
  text-align:center;
}
.auth-logo {
  font-family:'Bebas Neue',sans-serif; font-size:32px;
  color:var(--gold); letter-spacing:6px; margin-bottom:8px;
}
.auth-subtitle {
  color:var(--muted); font-size:13px; margin-bottom:32px;
}
.auth-divider {
  display:flex; align-items:center; gap:12px;
  margin:24px 0; color:var(--muted); font-size:12px;
}
.auth-divider::before, .auth-divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}
.auth-input {
  width:100%; padding:12px 16px; font-size:14px;
  background:var(--bg); border:1px solid var(--border);
  border-radius:8px; color:var(--text); outline:none;
  font-family:'Manrope',sans-serif; transition:border-color 0.2s;
}
.auth-input:focus { border-color:var(--gold); }
.auth-input::placeholder { color:var(--muted); }
.auth-btn {
  width:100%; padding:12px; font-size:14px; font-weight:700;
  background:var(--gold); color:#0d1117; border:none;
  border-radius:8px; cursor:pointer; letter-spacing:1px;
  text-transform:uppercase; font-family:'Manrope',sans-serif;
  transition:opacity 0.2s; margin-top:12px;
}
.auth-btn:hover { opacity:0.9; }
.auth-btn:disabled { opacity:0.5; cursor:not-allowed; }
.auth-error {
  color:var(--red); font-size:12px; margin-top:8px;
  min-height:18px;
}
.auth-back {
  color:var(--muted); font-size:12px; cursor:pointer;
  margin-top:16px; text-decoration:underline;
}
.auth-back:hover { color:var(--text); }
#telegram-login-wrap {
  display:flex; justify-content:center; margin-bottom:8px;
}
.tg-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; padding:12px; font-size:14px; font-weight:600;
  background:#2AABEE; color:#fff; border:none;
  border-radius:8px; cursor:pointer; font-family:'Manrope',sans-serif;
  transition:opacity 0.2s;
}
.tg-btn:hover { opacity:0.9; }
.tg-btn svg { width:20px; height:20px; }

/* ===== CABINET LAYOUT ===== */
#cabinet { display:none; }
.sidebar {
  position:fixed; left:0; top:0; bottom:0;
  width:var(--sidebar-w); background:var(--card);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  z-index:50; transition:transform 0.3s;
}
.sidebar-header {
  padding:20px 16px 16px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo {
  font-family:'Bebas Neue',sans-serif; font-size:20px;
  color:var(--gold); letter-spacing:4px;
}
.sidebar-nav {
  flex:1; overflow-y:auto; padding:8px 0;
}
.sidebar-section-label {
  font-size:10px; font-weight:700; color:var(--muted);
  letter-spacing:2px; text-transform:uppercase;
  padding:16px 16px 6px; margin-top:4px;
}
.sidebar-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; cursor:pointer;
  font-size:13px; color:var(--muted);
  transition:all 0.15s; border-left:3px solid transparent;
}
.sidebar-item:hover { color:var(--text); background:rgba(255,255,255,0.03); }
.sidebar-item.active {
  color:var(--gold); background:var(--gold-dim);
  border-left-color:var(--gold);
}
.sidebar-item-icon { font-size:16px; width:22px; text-align:center; }
.sidebar-footer {
  padding:16px; border-top:1px solid var(--border);
  font-size:11px; color:var(--muted); text-align:center;
}
.sidebar-footer a { color:var(--gold); text-decoration:none; }
.sidebar-footer a:hover { text-decoration:underline; }

/* Top bar */
.topbar {
  position:fixed; top:0; left:var(--sidebar-w); right:0;
  height:56px; background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; z-index:40;
}
.topbar-left { display:flex; align-items:center; gap:12px; }
.hamburger {
  display:none; background:none; border:none;
  color:var(--text); font-size:22px; cursor:pointer; padding:4px;
}
.topbar-title { font-size:14px; font-weight:600; }
.topbar-right { display:flex; align-items:center; gap:16px; }
.role-badge {
  font-size:10px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; padding:4px 10px;
  border-radius:4px; background:var(--gold-dim); color:var(--gold);
}
.status-dot {
  width:8px; height:8px; border-radius:50%;
  display:inline-block; margin-right:6px;
}
.status-dot.active { background:var(--green); }
.status-dot.frozen { background:var(--red); }
.status-dot.waitlist { background:var(--orange); }
.user-name { font-size:13px; font-weight:600; }
.logout-btn {
  font-size:11px; color:var(--muted); cursor:pointer;
  background:none; border:1px solid var(--border);
  padding:4px 12px; border-radius:4px;
  font-family:'Manrope',sans-serif; transition:all 0.2s;
}
.logout-btn:hover { color:var(--red); border-color:var(--red); }

/* Main content */
.main-content {
  margin-left:var(--sidebar-w); padding-top:56px;
  min-height:100vh;
}
.page { display:none; padding:28px; }
.page.active { display:block; }

/* ===== CARDS & GRIDS ===== */
.stats-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
  gap:16px; margin-bottom:24px;
}
.stat-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:20px;
}
.stat-label {
  font-size:11px; color:var(--muted); letter-spacing:1px;
  text-transform:uppercase; margin-bottom:8px;
}
.stat-value {
  font-size:32px; color:var(--text); line-height:1;
}
.stat-value.gold { color:var(--gold); }
.stat-value.green { color:var(--green); }
.stat-value.blue { color:var(--blue); }
.stat-sub { font-size:12px; color:var(--muted); margin-top:6px; }

.content-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:24px; margin-bottom:20px;
}
.content-card h3 {
  font-size:16px; color:var(--gold); margin-bottom:16px;
  letter-spacing:1px;
}

/* Tables */
.data-table {
  width:100%; border-collapse:collapse; font-size:13px;
}
.data-table th {
  text-align:left; padding:10px 12px;
  font-size:10px; font-weight:700; color:var(--muted);
  letter-spacing:1.5px; text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.data-table td {
  padding:10px 12px; border-bottom:1px solid rgba(48,54,61,0.5);
  color:var(--text);
}
.data-table tr:hover td { background:rgba(255,255,255,0.02); }

/* Badge pills */
.badge {
  font-size:10px; font-weight:700; padding:3px 8px;
  border-radius:3px; letter-spacing:0.5px; text-transform:uppercase;
}
.badge-gold { background:var(--gold-dim); color:var(--gold); }
.badge-green { background:rgba(63,185,80,0.12); color:var(--green); }
.badge-red { background:rgba(248,81,73,0.12); color:var(--red); }
.badge-blue { background:rgba(88,166,255,0.12); color:var(--blue); }
.badge-orange { background:rgba(210,153,34,0.12); color:var(--orange); }
.badge-muted { background:rgba(139,148,158,0.12); color:var(--muted); }

/* Chart containers */
.chart-wrap {
  position:relative; width:100%; max-width:600px;
  margin:0 auto;
}
.chart-wrap canvas { width:100%!important; }

/* Referral code box */
.ref-code-box {
  display:flex; align-items:center; gap:12px;
  background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:12px 16px; margin-top:12px;
}
.ref-code {
  font-family:monospace; font-size:16px; color:var(--gold);
  flex:1; letter-spacing:2px;
}
.copy-btn {
  background:var(--gold); color:#0d1117; border:none;
  padding:6px 14px; border-radius:6px; cursor:pointer;
  font-size:12px; font-weight:700; font-family:'Manrope',sans-serif;
}
.copy-btn:hover { opacity:0.9; }

/* Slider (calculator) */
.calc-slider {
  width:100%; margin:16px 0; accent-color:var(--gold);
  height:6px; cursor:pointer;
}
.calc-result {
  font-family:'Bebas Neue',sans-serif; font-size:36px;
  color:var(--gold); text-align:center; margin:12px 0;
}

/* Loading spinner */
.spinner {
  display:inline-block; width:18px; height:18px;
  border:2px solid var(--border); border-top-color:var(--gold);
  border-radius:50%; animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.loading-page {
  display:flex; align-items:center; justify-content:center;
  height:50vh; gap:12px; color:var(--muted); font-size:14px;
}

/* Empty state */
.empty-state {
  text-align:center; padding:48px 20px; color:var(--muted);
}
.empty-state-icon { font-size:48px; margin-bottom:12px; opacity:0.5; }
.empty-state-text { font-size:14px; }


/* ===== ALERTS ===== */
.alert{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:8px}
.alert.danger{background:rgba(248,81,73,0.1);border-left:3px solid var(--red)}
.alert.warn{background:rgba(210,153,34,0.1);border-left:3px solid var(--orange)}
.alert.success{background:rgba(63,185,80,0.1);border-left:3px solid var(--green)}
.alert.info{background:rgba(88,166,255,0.1);border-left:3px solid var(--blue)}
.alert-icon{font-size:16px;flex-shrink:0}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:16px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-top:3px solid var(--border);border-radius:8px;padding:16px}
.kpi-card.green{border-top-color:var(--green)}.kpi-card.gold{border-top-color:var(--gold)}
.kpi-card.blue{border-top-color:var(--blue)}.kpi-card.purple{border-top-color:var(--purple)}
.kpi-card.orange{border-top-color:var(--orange)}
.kpi-label{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);line-height:1.1}
.kpi-delta{font-size:11px;margin-top:4px}
.kpi-delta.up{color:var(--green)}.kpi-delta.down{color:var(--red)}.kpi-delta.neutral{color:var(--muted)}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--muted);min-width:80px}
.bar-track{flex:1;height:20px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-fill.blue{background:var(--blue)}.bar-fill.gold{background:var(--gold)}
.bar-fill.green{background:var(--green)}.bar-fill.orange{background:var(--orange)}
.bar-fill.purple{background:var(--purple)}
.bar-value{font-size:12px;color:var(--text);min-width:60px;text-align:right;font-weight:600}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.tier-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
@media(max-width:900px){.tier-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.tier-grid{grid-template-columns:1fr 1fr}}
.tier-card{padding:14px 8px;text-align:center;border-radius:8px}
.tier-value{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;margin-bottom:2px}
.tier-label{font-size:10px;margin-bottom:6px}
.tier-name{font-size:11px;color:var(--text);font-weight:700}
.formula-box{padding:14px;background:var(--card);border-left:3px solid var(--gold);margin-bottom:14px;border:1px solid var(--border);border-radius:0 8px 8px 0}
.formula-text{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);margin-bottom:6px}
.formula-desc{font-size:11px;color:var(--muted);line-height:1.6}
.formula-step{background:var(--card);padding:12px;display:flex;gap:12px;align-items:flex-start;border-bottom:1px solid var(--border)}
.formula-num{font-family:'Bebas Neue',sans-serif;font-size:22px;min-width:28px;line-height:1}
.note-box{padding:10px 12px;border-left:3px solid var(--gold);background:rgba(212,168,67,.08);font-size:11px;color:var(--text);margin-top:12px;border-radius:0 6px 6px 0}
.note-box.info{border-left-color:var(--blue);background:rgba(88,166,255,.08)}

.alert-info{background:rgba(88,166,255,.08);border-left-color:var(--blue)}
.alert-warn{background:rgba(210,153,34,.08);border-left-color:#d29922}
.form-input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-family:inherit}
.form-input:focus{outline:none;border-color:var(--gold)}
.btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-primary{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.btn-primary:hover{background:#e6bc50;border-color:#e6bc50}
.btn-sm{padding:4px 10px;font-size:12px}
.tier-card.active{border-width:2px;box-shadow:0 0 12px rgba(212,168,67,.3)}

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
  :root { --sidebar-w:0px; }
  .sidebar {
    width:260px; transform:translateX(-100%);
  }
  .sidebar.open { transform:translateX(0); }
  .hamburger { display:block; }
  .main-content { margin-left:0; }
  .topbar { left:0; }
  .sidebar-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.6); z-index:45;
  }
  .sidebar-overlay.show { display:block; }
  .stats-grid { grid-template-columns:1fr; }
}
@media (max-width:480px) {
  .page { padding:16px; }
  .auth-container { padding:32px 20px; }
  .stat-value { font-size:26px; }
}

/* ===== CARD & LIST-ROW (layout fix 29.05.2026) ===== */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; margin-bottom:16px; overflow:hidden;
}
.card-header {
  font-family:'Bebas Neue',sans-serif; font-size:16px;
  letter-spacing:1.5px; padding:14px 16px;
  border-bottom:1px solid var(--border); color:var(--gold);
}
.list-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 16px; border-bottom:1px solid rgba(48,54,61,0.5);
  font-size:13px; gap:12px;
}
.list-row:last-child { border-bottom:none; }
.list-row > span:first-child { color:var(--muted); white-space:nowrap; }
.list-row > span:last-child { text-align:right; font-weight:500; }

/* --- Print styles for PDF export --- */
@media print {
  body { background: #fff !important; color: #000 !important; }
  .sidebar, .nav-header, .mobile-nav, #auth-screen { display: none !important; }
  .main-content { margin: 0 !important; padding: 10px !important; }
  .card { break-inside: avoid; border: 1px solid #ccc !important; background: #fff !important; }
  .kpi-card { border: 1px solid #ccc !important; background: #f9f9f9 !important; }
  .kpi-value, .stat-value { color: #000 !important; }
  .bar-fill { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .badge { border: 1px solid #999 !important; }
}
</style>
</head>
<body>

<!-- ==================== AUTH SCREEN ==================== -->
<div id="auth-screen">
  <div class="auth-container">
    <div class="auth-logo">SHIKARDOS TEAM</div>
    <div class="auth-subtitle">Личный кабинет участника</div>

    <!-- Step 1: Choose method -->
    <div id="auth-step-choose">
      <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Войти с помощью:</p>

      <button class="tg-btn" onclick="startTelegramAuth()" id="tg-auth-btn">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:22px;height:22px;margin-right:8px"><path d="M11.944 0A12 12 0 1 0 24 12.056A12.013 12.013 0 0 0 11.944 0Zm5.592 8.3-1.868 8.8c-.14.636-.508.79-1.03.492l-2.848-2.1-1.374 1.322c-.152.152-.28.28-.574.28l.204-2.9 5.272-4.762c.23-.204-.05-.318-.356-.114l-6.516 4.104-2.808-.876c-.61-.192-.622-.61.128-.904l10.972-4.23c.508-.184.952.124.788.898Z"/></svg>
        Telegram
      </button>
      <p style="color:var(--muted);font-size:11px;margin:8px 0 16px;text-align:center">доступ к сайту и телеграм-боту</p>

      <div class="auth-divider">или</div>

      <div id="google-btn-wrap" style="display:flex;justify-content:center;margin:12px 0">
        <div id="g_id_onload"
             data-client_id="654227330582-94gbaus2l20l9l9d3j7260s1h33g1blt.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleAuth"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="filled_black"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left"
             data-width="300">
        </div>
      </div>

      <div id="auth-error-choose" class="auth-error"></div>
    </div>

    <!-- Step: Telegram deeplink waiting -->
    <div id="auth-step-tg" style="display:none">
      <p style="color:var(--muted);font-size:13px;margin-bottom:12px">
        Телеграм-авторизация
      </p>
      <p style="color:var(--text);font-size:14px;margin-bottom:16px">
        Пожалуйста, завершите авторизацию в Telegram
      </p>
      <div id="tg-qr-wrap" style="display:flex;justify-content:center;margin:16px 0"></div>
      <p id="tg-timer" style="color:var(--gold);font-size:14px;text-align:center;margin:12px 0"></p>
      <a id="tg-open-btn" href="#" target="_blank" class="tg-btn" style="display:block;text-align:center;text-decoration:none;margin-bottom:8px">Открыть Telegram</a>
      <div class="auth-back" onclick="cancelTelegramAuth();showAuthStep('choose')">&larr; Другой способ входа</div>
    </div>

    <!-- Loading -->
    <div id="auth-step-loading" style="display:none">
      <div class="spinner" style="width:32px;height:32px;border-width:3px;margin:20px auto"></div>
      <p style="color:var(--muted);font-size:13px;margin-top:12px">Авторизация...</p>
    </div>
  </div>
</div>

<!-- ==================== CABINET ==================== -->
<div id="cabinet">
  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">SHIKARDOS TEAM</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- filled by JS -->
    </nav>
    <div class="sidebar-footer">
      Shikardos Team &copy; 2026<br>

<script>
/* ============================================================
   Shikardos Team — Personal Cabinet
   Single-file SPA, no frameworks, Chart.js only
   ============================================================ */

const API_BASE = 'https://worker-production-26d0.up.railway.app/api/v1';
let token = sessionStorage.getItem('st_token') || null;
let currentUser = null;
let charts = {};

// ===== API HELPER =====
async function api(path, method, body) {
  if (typeof method === 'object') { body = method; method = 'POST'; }
  var opts = { method: method || 'GET' };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API_BASE + path, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (token || '')
      }
    });
    if (res.status === 401) { logout(); return null; }
    const data = await res.json();
    return data;
  } catch (e) {
    console.error('API error:', path, e);
    return null;
  }
}

// ===== AUTH FUNCTIONS =====
function showAuthStep(step) {
  ['choose','tg','loading'].forEach(s => {
    const el = document.getElementById('auth-step-' + s);
    if (el) el.style.display = s === step ? '' : 'none';
  });
  clearAuthErrors();
}

function clearAuthErrors() {
  document.querySelectorAll('.auth-error').forEach(el => el.textContent = '');
}

// ── Telegram deeplink auth ──
let _tgPollInterval = null;

async function startTelegramAuth() {
  showAuthStep('tg');
  const data = await api('/auth/request-link', 'POST');
  if (!data || !data.auth_token) {
    showAuthStep('choose');
    return;
  }
  const { auth_token, deeplink, expires_in } = data;

  // QR-код через API
  const qrWrap = document.getElementById('tg-qr-wrap');
  qrWrap.innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' +
    encodeURIComponent(deeplink) + '" alt="QR" style="border-radius:8px;background:#fff;padding:8px">';

  // Кнопка "Открыть Telegram"
  document.getElementById('tg-open-btn').href = deeplink;

  // Таймер
  let remaining = expires_in;
  const timerEl = document.getElementById('tg-timer');
  const tick = () => {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    timerEl.textContent = 'Осталось времени: ' + m + ':' + String(s).padStart(2, '0');
    remaining--;
    if (remaining < 0) { cancelTelegramAuth(); showAuthStep('choose'); }
  };
  tick();
  const timerInterval = setInterval(tick, 1000);

  // Polling каждые 2 сек
  const pollId = setInterval(async () => {
    const res = await api('/auth/check/' + auth_token);
    if (!res) return;
    if (res.status === 'confirmed' && res.token) {
      cancelTelegramAuth();
      token = res.token;
      sessionStorage.setItem('st_token', token);
      await loadCabinet();
    } else if (res.status === 'expired') {
      cancelTelegramAuth();
      showAuthStep('choose');
    }
  }, 2000);

  _tgPollInterval = { poll: pollId, timer: timerInterval };
}

function cancelTelegramAuth() {
  if (_tgPollInterval) {
    if (_tgPollInterval.poll) clearInterval(_tgPollInterval.poll);
    if (_tgPollInterval.timer) clearInterval(_tgPollInterval.timer);
    _tgPollInterval = null;
  }
}

// ── Google OAuth ──
window.handleGoogleAuth = async function(response) {
  showAuthStep('loading');
  const data = await api('/auth/google', 'POST', { credential: response.credential });
  if (data && data.token) {
    token = data.token;
    sessionStorage.setItem('st_token', token);
    await loadCabinet();
  } else {
    showAuthStep('choose');
    document.getElementById('auth-error-choose').textContent =
      (data && data.detail) || 'Аккаунт с этим email не найден. Зарегистрируйтесь через бота.';
  }
};

function logout() {
  token = null;
  sessionStorage.removeItem('st_token');
  currentUser = null;
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  document.getElementById('cabinet').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  showAuthStep('choose');
}


// ===== TOAST NOTIFICATIONS =====
function showToast(msg, type) {
  var t = document.createElement('div');
  t.textContent = msg;
  var bg = type === 'error' ? 'var(--red)' : type === 'warn' ? 'var(--orange)' : 'var(--green)';
  t.style.cssText = 'position:fixed;top:20px;right:20px;z-index:99999;padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;background:' + bg + ';box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:opacity 0.5s';
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 500); }, 3000);
}

// ===== EXPORT FUNCTIONS =====
function exportCSV() {
  var page = document.querySelector('.page-content[style*="display: block"], .page-content[style*="display:block"]');
  if (!page) page = document.querySelector('.page-content:not([style*="display: none"])');
  if (!page) { showToast('Нет данных для экспорта', 'warn'); return; }
  var tables = page.querySelectorAll('table');
  if (tables.length === 0) {
    // fallback: collect list-row data
    var rows = page.querySelectorAll('.list-row');
    if (rows.length === 0) { showToast('Нет табличных данных на странице', 'warn'); return; }
    var csv = '\xEF\xBB\xBF';
    rows.forEach(function(r) {
      var cells = r.querySelectorAll('span');
      var line = [];
      cells.forEach(function(c) { line.push('"' + c.textContent.trim().replace(/"/g, '""') + '"'); });
      csv += line.join(';') + '\n';
    });
    downloadFile(csv, 'cabinet_export_' + dateStamp() + '.csv', 'text/csv;charset=utf-8');
    showToast('CSV экспортирован', 'ok');
    return;
  }
  var csv = '\xEF\xBB\xBF';
  tables.forEach(function(tbl, idx) {
    if (idx > 0) csv += '\n\n';
    tbl.querySelectorAll('tr').forEach(function(tr) {
      var cells = tr.querySelectorAll('th, td');
      var line = [];
      cells.forEach(function(c) { line.push('"' + c.textContent.trim().replace(/"/g, '""') + '"'); });
      csv += line.join(';') + '\n';
    });
  });
  downloadFile(csv, 'cabinet_export_' + dateStamp() + '.csv', 'text/csv;charset=utf-8');
  showToast('CSV экспортирован (' + tables.length + ' табл.)', 'ok');

function exportSnapshot() {
  if (typeof html2canvas === 'undefined') { showToast('html2canvas не загружен', 'error'); return; }
  var page = document.querySelector('.page-content[style*="display: block"], .page-content[style*="display:block"]');
  if (!page) page = document.querySelector('.page-content:not([style*="display: none"])');
  if (!page) { showToast('Нет контента для скриншота', 'warn'); return; }
  showToast('Создаю скриншот...', 'ok');
  html2canvas(page, {
    backgroundColor: '#0d1117',
    scale: 2,
    useCORS: true,
    logging: false
  }).then(function(canvas) {
    var link = document.createElement('a');
    link.download = 'cabinet_snapshot_' + dateStamp() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('Скриншот сохранён', 'ok');
  }).catch(function(e) {
    showToast('Ошибка: ' + e.message, 'error');
  });
}

function downloadFile(content, filename, mimeType) {
  var blob = new Blob([content], { type: mimeType });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function dateStamp() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ===== OPS CENTER ACTIONS =====
function opsAction(actionName, endpoint) {
  if (!confirm('Выполнить: ' + actionName + '?')) return;
  showToast(actionName + '...', 'ok');

    if (res && !res.error) {
      showToast(actionName + ' — OK', 'ok');

      showToast(actionName + ' — endpoint не подключён', 'warn');
    }
  }).catch(function() {
    showToast(actionName + ' — endpoint не подключён', 'warn');
  });
}

  if (r === 'hr' && currentUser.team_role && currentUser.team_role.includes('hr')) return true;
  if (r === 'team' && currentUser.role === 'team') return true;
  return false;
}

              pending:'Ожидание', banned:'Заблокирован' };

// ===== NAVIGATION =====
function navigateTo(pageId) {
  // Update sidebar
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === pageId);
  });

  // Update topbar title
  const activeItem = document.querySelector(`.sidebar-item[data-page="${pageId}"]`);
  if (activeItem) {
    document.getElementById('topbar-title').textContent = activeItem.textContent.trim();
  }

  // Show page
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + pageId);
  if (page) {
    page.classList.add('active');
    loadPageData(pageId);
  }

  // Close mobile sidebar
  closeSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

function fmtViews(n) {
  if (!n || n === 0) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

function renderForecastChart(shares) {
  if (charts['forecast']) charts['forecast'].destroy();
  const multipliers = [127, 254, 508, 1018, 2036];
  const data = multipliers.map(m => shares * m);

  charts['forecast'] = new Chart(document.getElementById('chart-forecast'), {
    type: 'line',
    data: {
      labels: ['Год 1','Год 2','Год 3','Год 4','Год 5'],
      datasets: [{
        label: 'Доход / мес ($)',
        data: data,
        borderColor: '#d4a843',
        backgroundColor: 'rgba(212,168,67,0.1)',
        borderWidth: 2,
        tension: 0.3,
        fill: true,
        pointBackgroundColor: '#d4a843',
        pointRadius: 5
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color:'#8b949e', font:{ family:'Manrope' } } }
      },
      scales: {
        x: { ticks:{ color:'#8b949e' }, grid:{ color:'rgba(48,54,61,0.5)' } },
        y: { ticks:{ color:'#8b949e', callback: v => '$' + v.toLocaleString() }, grid:{ color:'rgba(48,54,61,0.5)' } }
      }
    }
  });
}

function copyRefCode() {
  const code = document.getElementById('ref-code-value')?.textContent;
  if (code && code !== '—') {
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Скопировано!';
      setTimeout(() => btn.textContent = 'Копировать', 2000);
    });
  }
}

function showProfileEdit() {
  document.getElementById('profile-view').style.display = 'none';
  document.getElementById('profile-edit').style.display = 'block';
}
function cancelProfileEdit() {
  document.getElementById('profile-view').style.display = 'block';
  document.getElementById('profile-edit').style.display = 'none';
}
async function saveProfile() {
  var name = document.getElementById('edit-name').value.trim();
  var email = document.getElementById('edit-email').value.trim();
  var msg = document.getElementById('profile-msg');
  msg.style.color = 'var(--muted)';
  msg.textContent = 'Сохранение...';
  var res = await api('/profile', 'PUT', { display_name: name, email: email });
  if (res && !res.error) {
    msg.style.color = 'var(--green)';
    msg.textContent = '✓ Сохранено';
    if (name) { currentUser.display_name = name; currentUser.full_name = name; }
    if (email) currentUser.email = email;
    setTimeout(function() { cancelProfileEdit(); loadProfile(); }, 1000);
  } else {
    msg.style.color = 'var(--red)';
    msg.textContent = (res && (res.error || res.detail)) || 'Ошибка';
  }
}

// ---------- VIDEOS ----------
async function loadVideos() {
  const page = document.getElementById('page-videos');
  const data = await api('/videos');
  const videos = data?.videos || data || [];

  var platforms = {};
  var weeklyCount = 0;
  var now = Date.now();
  var weekAgo = now - 7*24*3600*1000;
  if (Array.isArray(videos)) {
    for (var i = 0; i < videos.length; i++) {
      var v = videos[i];
      var p = v.platform || 'Other';
      if (!platforms[p]) platforms[p] = { count: 0, views: 0 };
      platforms[p].count++;
      platforms[p].views += (v.views || 0);
      if (v.created_at && new Date(v.created_at).getTime() > weekAgo) weeklyCount++;
    }
  }

  var total = Array.isArray(videos) ? videos.length : 0;
  var totalViews = 0;
  var platLabels = Object.keys(platforms);
  for (var k = 0; k < platLabels.length; k++) totalViews += platforms[platLabels[k]].views;
  var avgViews = total > 0 ? Math.round(totalViews / total) : 0;

  var alertHtml = '';
  if (total === 0) alertHtml = '<div class="alert alert-warn">\ud83c\udfa5 \u0412\u044b \u043f\u043e\u043a\u0430 \u043d\u0435 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043b\u0438 \u043d\u0438 \u043e\u0434\u043d\u043e\u0433\u043e \u0432\u0438\u0434\u0435\u043e.</div>';
  else if (weeklyCount < 3) alertHtml = '<div class="alert alert-warn">\u26a0\ufe0f \u0417\u0430 \u044d\u0442\u0443 \u043d\u0435\u0434\u0435\u043b\u044e: ' + weeklyCount + '/3 \u0432\u0438\u0434\u0435\u043e. \u041c\u0438\u043d\u0438\u043c\u0443\u043c 3 \u0447\u0442\u043e\u0431\u044b \u0438\u0437\u0431\u0435\u0436\u0430\u0442\u044c \u0437\u0430\u043c\u043e\u0440\u043e\u0437\u043a\u0438.</div>';

  var barsHtml = '';
  for (var j = 0; j < platLabels.length; j++) {
    var pl = platLabels[j];
    var pct = total > 0 ? Math.round(platforms[pl].count / total * 100) : 0;
    barsHtml += '<div class="bar-row"><span style="min-width:80px">' + esc(pl) + '</span>' +
      '<div style="flex:1;background:var(--card-border);border-radius:4px;height:22px;overflow:hidden">' +
      '<div style="width:' + pct + '%;background:var(--gold);height:100%;border-radius:4px;min-width:2px"></div></div>' +
      '<span style="min-width:60px;text-align:right">' + platforms[pl].count + ' (' + fmtViews(platforms[pl].views) + ')</span></div>';
  }

  var sorted = Array.isArray(videos) ? videos.slice().sort(function(a,b) { return new Date(b.created_at||0) - new Date(a.created_at||0); }).slice(0, 10) : [];
  var recentHtml = '';
  if (sorted.length > 0) {
    recentHtml = '<div class="content-card"><h3>\u041f\u043e\u0441\u043b\u0435\u0434\u043d\u0438\u0435 \u0432\u0438\u0434\u0435\u043e</h3><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>\u041f\u043b\u0430\u0442\u0444\u043e\u0440\u043c\u0430</th><th>\u041f\u0440\u043e\u0441\u043c\u043e\u0442\u0440\u044b</th><th>\u0414\u0430\u0442\u0430</th><th>\u0421\u0442\u0430\u0442\u0443\u0441</th></tr></thead><tbody>';
    for (var r = 0; r < sorted.length; r++) {
      var sv = sorted[r];
      recentHtml += '<tr><td>' + esc(sv.platform || '\u2014') + '</td><td>' + fmtViews(sv.views || 0) + '</td><td>' + fmtDate(sv.created_at) + '</td>' +
        '<td><span class="badge badge-' + (sv.status === 'verified' ? 'green' : sv.status === 'rejected' ? 'red' : 'muted') + '">' + (sv.status || 'pending') + '</span></td></tr>';
    }
    recentHtml += '</tbody></table></div></div>';
  }

  page.innerHTML =
    '<div class="section-title">\u0412\u0438\u0434\u0435\u043e</div>' +
    alertHtml +
    '<div class="kpi-row">' +
      '<div class="kpi-card"><div class="stat-label">\u0412\u0441\u0435\u0433\u043e \u0432\u0438\u0434\u0435\u043e</div><div class="stat-value blue">' + fmtNum(total) + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u041f\u0440\u043e\u0441\u043c\u043e\u0442\u0440\u044b</div><div class="stat-value green">' + fmtViews(totalViews) + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0421\u0440\u0435\u0434\u043d\u0435\u0435</div><div class="stat-value">' + fmtViews(avgViews) + '</div><div class="stat-sub">\u043f\u0440\u043e\u0441\u043c/\u0432\u0438\u0434\u0435\u043e</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0417\u0430 \u043d\u0435\u0434\u0435\u043b\u044e</div><div class="stat-value' + (weeklyCount < 3 ? '" style="color:var(--red)"' : ' gold"') + '>' + weeklyCount + '/3</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u041f\u043b\u0430\u0442\u0444\u043e\u0440\u043c</div><div class="stat-value">' + platLabels.length + '</div></div>' +
    '</div>' +
    '<div class="grid-2">' +
      '<div class="content-card"><h3>\u041f\u043e \u043f\u043b\u0430\u0442\u0444\u043e\u0440\u043c\u0430\u043c</h3>' + (barsHtml || '<p style="color:var(--muted)">\u041d\u0435\u0442 \u0434\u0430\u043d\u043d\u044b\u0445</p>') + '</div>' +
      '<div class="content-card"><h3>\u0420\u0430\u0441\u043f\u0440\u0435\u0434\u0435\u043b\u0435\u043d\u0438\u0435</h3><div class="chart-wrap" style="max-width:300px"><canvas id="chart-platforms"></canvas></div></div>' +
    '</div>' +
    recentHtml;

  if (platLabels.length > 0) {
    if (charts['platforms']) charts['platforms'].destroy();
    var colors = ['#d4a843','#58a6ff','#3fb950','#f85149','#d29922','#bc8cff'];
    var platCounts = [];
    for (var c = 0; c < platLabels.length; c++) platCounts.push(platforms[platLabels[c]].count);
    charts['platforms'] = new Chart(document.getElementById('chart-platforms'), {
      type: 'doughnut',
      data: { labels: platLabels, datasets: [{ data: platCounts, backgroundColor: platLabels.map(function(_,i) { return colors[i % colors.length]; }), borderWidth: 0 }] },
      options: { responsive: true, plugins:{ legend:{ position:'bottom', labels:{ color:'#8b949e', font:{ family:'Manrope' }, padding:12 } } } }
    });
  }
}


// ---------- KE ----------
async function loadKE() {
  const page = document.getElementById('page-ke');
  const data = await api('/ke');
  const ke = data?.ke || data || {};
  const score = ke.score ?? ke.total ?? 0;
  const tier = ke.tier || ke.level || '\u2014';
  const rank = ke.rank || '\u2014';
  const breakdown = ke.breakdown || {};
  var breakdownItems = [];
  var bKeys = Object.keys(breakdown);
  for (var b = 0; b < bKeys.length; b++) breakdownItems.push([bKeys[b], breakdown[bKeys[b]]]);

  var tierData = [
    {name:'Tier 1',bonus:'+5 \u0430\u043a\u0446/\u0433\u043e\u0434',range:'1-1000',color:'var(--gold)'},
    {name:'Tier 2',bonus:'+4 \u0430\u043a\u0446/\u0433\u043e\u0434',range:'1001-2000',color:'#3fb950'},
    {name:'Tier 3',bonus:'+3 \u0430\u043a\u0446/\u0433\u043e\u0434',range:'2001-3000',color:'#58a6ff'},
    {name:'Tier 4',bonus:'+2 \u0430\u043a\u0446/\u0433\u043e\u0434',range:'3001-4000',color:'#d29922'},
    {name:'Tier 5',bonus:'+1 \u0430\u043a\u0446/\u0433\u043e\u0434',range:'4001-5000',color:'#8b949e'}
  ];
  var tiersHtml = '<div class="tier-grid">';
  for (var t = 0; t < tierData.length; t++) {
    var td = tierData[t];
    var isActive = (String(tier).indexOf(String(t+1)) !== -1);
    tiersHtml += '<div class="tier-card' + (isActive ? ' active' : '') + '" style="border-color:' + td.color + '"><strong style="color:' + td.color + '">' + td.name + '</strong><div class="stat-value" style="font-size:18px;color:' + td.color + '">' + td.bonus + '</div><div style="color:var(--muted);font-size:12px">' + td.range + '</div></div>';
  }
  tiersHtml += '</div>';

  var tips = [];
  if ((breakdown.views || 0) < 40) tips.push('\ud83d\udcc8 \u0423\u0432\u0435\u043b\u0438\u0447\u044c\u0442\u0435 \u043f\u0440\u043e\u0441\u043c\u043e\u0442\u0440\u044b \u2014 \u0442\u0440\u0435\u043d\u0434\u043e\u0432\u044b\u0435 \u0442\u0435\u043c\u044b \u0438 SEO');
  if ((breakdown.engagement || 0) < 40) tips.push('\ud83d\udcac \u041f\u043e\u0432\u044b\u0441\u044c\u0442\u0435 \u0432\u043e\u0432\u043b\u0435\u0447\u0451\u043d\u043d\u043e\u0441\u0442\u044c \u2014 CTA \u0432 \u0432\u0438\u0434\u0435\u043e');
  if ((breakdown.uniformity || 0) < 20) tips.push('\ud83d\udcc5 \u041f\u0443\u0431\u043b\u0438\u043a\u0443\u0439\u0442\u0435 \u0440\u0430\u0432\u043d\u043e\u043c\u0435\u0440\u043d\u043e');
  var tipsHtml = '';
  if (tips.length > 0) {
    tipsHtml = '<div class="note-box"><strong>\u0420\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0430\u0446\u0438\u0438:</strong><br>';
    for (var tp = 0; tp < tips.length; tp++) tipsHtml += tips[tp] + '<br>';
    tipsHtml += '</div>';
  }

  page.innerHTML =
    '<div class="section-title">\u041a\u043e\u044d\u0444\u0444\u0438\u0446\u0438\u0435\u043d\u0442 \u044d\u0444\u0444\u0435\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u0438 (\u041a\u042d)</div>' +
    '<div class="alert alert-info">\ud83d\udcd6 \u041a\u042d \u043f\u0435\u0440\u0435\u0441\u0447\u0438\u0442\u044b\u0432\u0430\u0435\u0442\u0441\u044f \u0435\u0436\u0435\u0433\u043e\u0434\u043d\u043e 31 \u0434\u0435\u043a\u0430\u0431\u0440\u044f. \u0424\u043e\u0440\u043c\u0443\u043b\u0430 \u0443\u0447\u0438\u0442\u044b\u0432\u0430\u0435\u0442 \u043f\u0440\u043e\u0441\u043c\u043e\u0442\u0440\u044b, \u0432\u043e\u0432\u043b\u0435\u0447\u0451\u043d\u043d\u043e\u0441\u0442\u044c \u0438 \u0440\u0430\u0432\u043d\u043e\u043c\u0435\u0440\u043d\u043e\u0441\u0442\u044c.</div>' +
    '<div class="kpi-row">' +
      '<div class="kpi-card"><div class="stat-label">\u0422\u0435\u043a\u0443\u0449\u0438\u0439 \u041a\u042d</div><div class="stat-value gold">' + (typeof score === 'number' ? score.toFixed(2) : score) + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0422\u0438\u0440</div><div class="stat-value" style="font-size:22px">' + esc(String(tier)) + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0420\u0430\u043d\u0433</div><div class="stat-value blue">#' + esc(String(rank)) + '</div><div class="stat-sub">\u0438\u0437 5 000</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0414\u043e \u043f\u0435\u0440\u0435\u0441\u0447\u0451\u0442\u0430</div><div class="stat-value">' + daysUntilNewYear() + '</div><div class="stat-sub">\u0434\u043d\u0435\u0439</div></div>' +
    '</div>' +
    '<div class="grid-2">' +
      '<div class="content-card"><h3>\u0414\u0435\u0442\u0430\u043b\u0438\u0437\u0430\u0446\u0438\u044f</h3>' +
        (breakdownItems.length > 0 ? '<div class="chart-wrap" style="max-width:280px"><canvas id="chart-ke"></canvas></div>' : '<p style="color:var(--muted)">\u041d\u0435\u0442 \u0434\u0430\u043d\u043d\u044b\u0445</p>') +
      '</div>' +
      '<div class="content-card"><h3>\u0424\u043e\u0440\u043c\u0443\u043b\u0430 \u041a\u042d</h3>' +
        '<div class="formula-box">' +
          '<div class="formula-step"><span style="color:var(--gold)">\u041f\u0440\u043e\u0441\u043c\u043e\u0442\u0440\u044b</span> \u00d7 0.4</div>' +
          '<div class="formula-step"><span style="color:var(--green)">\u0426\u0435\u043b\u0435\u0432\u043e\u0439 Engagement</span> \u00d7 0.4</div>' +
          '<div class="formula-step"><span style="color:var(--blue)">\u0420\u0430\u0432\u043d\u043e\u043c\u0435\u0440\u043d\u043e\u0441\u0442\u044c</span> \u00d7 0.2</div>' +
        '</div>' +
        tipsHtml +
      '</div>' +
    '</div>' +
    '<div class="content-card"><h3>\u0421\u0438\u0441\u0442\u0435\u043c\u0430 \u0442\u0438\u0440\u043e\u0432</h3>' + tiersHtml + '</div>';

  if (breakdownItems.length > 0) {
    if (charts['ke']) charts['ke'].destroy();
    var colors = ['#d4a843','#3fb950','#58a6ff','#f85149','#d29922','#bc8cff'];
    charts['ke'] = new Chart(document.getElementById('chart-ke'), {
      type: 'doughnut',
      data: { labels: breakdownItems.map(function(x){return x[0];}), datasets: [{ data: breakdownItems.map(function(x){return x[1];}), backgroundColor: breakdownItems.map(function(_,i){return colors[i%colors.length];}), borderWidth: 0 }] },
      options: { responsive: true, plugins:{ legend:{ position:'bottom', labels:{ color:'#8b949e', font:{ family:'Manrope' }, padding:12 } } } }
    });
  }
}

function daysUntilNewYear() {
  var now = new Date();
  var end = new Date(now.getFullYear(), 11, 31);
  if (now > end) end = new Date(now.getFullYear() + 1, 11, 31);
  return Math.ceil((end - now) / 86400000);
}


// ---------- CONTENT ----------
async function loadContent() {
  var page = document.getElementById('page-content');
  try {
    var d = await api('/content') || {};
    if (!d || typeof d !== 'object') d = await api('/admin/stats') || {};

    var vidsWeek = d.videos_this_week || 0;
    var totalVids = d.total_videos || 0;
    var avgPerMaker = d.avg_per_maker || 0;
    var platformsCov = d.platforms_covered || '0/4';
    var belowPlan = d.makers_below_plan || 0;

    var kpiRow = '<div class="kpi-row">' +
      '<div class="kpi-card"><div class="stat-label">🎬 Видео/неделя</div><div class="stat-value blue">' + fmtNum(vidsWeek) + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">📹 Всего видео</div><div class="stat-value gold">' + fmtNum(totalVids) + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">📊 Ср. на мейкера</div><div class="stat-value green">' + avgPerMaker + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">🌍 Платформы</div><div class="stat-value purple">' + esc(String(platformsCov)) + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">⚠️ Ниже плана</div><div class="stat-value ' + (belowPlan > 0 ? 'red' : 'green') + '">' + belowPlan + '</div></div>' +
      '</div>';

    var platforms = d.platform_publications || [
      { name: 'YouTube', count: 0, color: 'var(--red)' },
      { name: 'Instagram', count: 0, color: 'var(--purple)' },
      { name: 'TikTok', count: 0, color: 'var(--blue)' },
      { name: 'Facebook', count: 0, color: 'var(--orange)' }
    ];
    var maxPub = 1;
    for (var p = 0; p < platforms.length; p++) { if (platforms[p].count > maxPub) maxPub = platforms[p].count; }
    var pubBars = '';
    for (var p = 0; p < platforms.length; p++) {
      var pl = platforms[p];
      var pPct = Math.round((pl.count / maxPub) * 100);
      pubBars += '<div class="bar-row"><div class="bar-label">' + esc(pl.name) + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pPct + '%;background:' + (pl.color || 'var(--blue)') + '"></div></div>' +
        '<div class="bar-value">' + fmtNum(pl.count) + '</div></div>';
    }
    var pubCard = '<div class="content-card"><h3>📱 Публикации по платформам (неделя)</h3><div class="bar-chart">' + pubBars + '</div></div>';

    var viewsData = d.views_by_platform || [
      { name: 'YouTube', views: 0 },
      { name: 'Instagram', views: 0 },
      { name: 'TikTok', views: 0 },
      { name: 'Facebook', views: 0 }
    ];
    var maxViews = 1;
    for (var v = 0; v < viewsData.length; v++) { if (viewsData[v].views > maxViews) maxViews = viewsData[v].views; }
    var viewBars = '';
    for (var v = 0; v < viewsData.length; v++) {
      var vd = viewsData[v];
      var vPct = Math.round((vd.views / maxViews) * 100);
      viewBars += '<div class="bar-row"><div class="bar-label">' + esc(vd.name) + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + vPct + '%;background:var(--gold)"></div></div>' +
        '<div class="bar-value">' + fmtNum(vd.views) + '</div></div>';
    }
    var viewCard = '<div class="content-card"><h3>👁️ Просмотры по платформам</h3><div class="bar-chart">' + viewBars + '</div></div>';

    var tiers = d.uniformity_tiers || null;
    var tiersEmpty = !tiers || ((tiers.t4||0)+(tiers.t3||0)+(tiers.t2||0)+(tiers.t1||0)) === 0;
    if (!tiers) tiers = { t4: 0, t3: 0, t2: 0, t1: 0 };
    var totalMakers = (tiers.t4 || 0) + (tiers.t3 || 0) + (tiers.t2 || 0) + (tiers.t1 || 0);
    var uniPct = totalMakers > 0 ? Math.round(((tiers.t4 || 0) / totalMakers) * 100) : 0;
    var uniCard = '<div class="content-card"><h3>📊 Равномерность публикаций</h3>' +
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">' +
      '<div style="padding:12px;background:var(--bg);border-radius:8px;text-align:center"><div style="font-size:24px;color:var(--green);font-weight:700">' + (tiers.t4 || 0) + '</div><div style="font-size:11px;color:var(--muted)">4/4 нед.</div></div>' +
      '<div style="padding:12px;background:var(--bg);border-radius:8px;text-align:center"><div style="font-size:24px;color:var(--blue);font-weight:700">' + (tiers.t3 || 0) + '</div><div style="font-size:11px;color:var(--muted)">3/4 нед.</div></div>' +
      '<div style="padding:12px;background:var(--bg);border-radius:8px;text-align:center"><div style="font-size:24px;color:var(--orange);font-weight:700">' + (tiers.t2 || 0) + '</div><div style="font-size:11px;color:var(--muted)">2/4 нед.</div></div>' +
      '<div style="padding:12px;background:var(--bg);border-radius:8px;text-align:center"><div style="font-size:24px;color:var(--red);font-weight:700">' + (tiers.t1 || 0) + '</div><div style="font-size:11px;color:var(--muted)">0-1/4 нед.</div></div>' +
      '</div>' +
      '<div style="margin-top:8px"><div style="font-size:12px;color:var(--muted);margin-bottom:4px">Общая равномерность: ' + uniPct + '%</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + uniPct + '%;background:var(--green)"></div></div></div></div>';

    if (tiersEmpty) uniCard = '<div class="content-card"><h3>\uD83D\uDCCA Равномерность публикаций</h3><div style="color:var(--muted);text-align:center;padding:24px">Нет данных — будет доступно после первой недели</div></div>';
    var weeks = d.weekly_dynamics || [];
    var dynBars = '';
    var maxW = 1;
    for (var w = 0; w < weeks.length; w++) { if ((weeks[w].count || 0) > maxW) maxW = weeks[w].count; }
    for (var w = 0; w < weeks.length && w < 8; w++) {
      var wk = weeks[w];
      var wPct = Math.round(((wk.count || 0) / maxW) * 100);
      dynBars += '<div class="bar-row"><div class="bar-label">Нед. ' + (wk.week || (w + 1)) + '</div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + wPct + '%;background:var(--blue)"></div></div>' +
        '<div class="bar-value">' + (wk.count || 0) + '</div></div>';
    }
    if (!dynBars) dynBars = '<div style="color:var(--muted);text-align:center;padding:16px">Нет данных</div>';
    var dynCard = '<div class="content-card"><h3>📈 Динамика публикаций (8 недель)</h3><div class="bar-chart">' + dynBars + '</div></div>';

    var anomalies = d.anomalies || [];
    var anoRows = '';
    for (var a = 0; a < anomalies.length; a++) {
      var an = anomalies[a];
      anoRows += '<tr>' +
        '<td>' + esc(an.maker || '—') + '</td>' +
        '<td><span class="badge badge-' + (an.type === 'no_publish' ? 'red' : 'orange') + '">' + esc(an.type || '—') + '</span></td>' +
        '<td>' + esc(an.details || '—') + '</td>' +
        '<td>' + (an.days || 0) + ' дн.</td></tr>';
    }
    if (!anoRows) anoRows = '<tr><td colspan="4" style="text-align:center;color:var(--muted)">Аномалий не обнаружено ✅</td></tr>';
    var anoTable = '<div class="content-card"><h3>⚠️ Аномалии</h3>' +
      '<div style="overflow-x:auto"><table class="data-table">' +
      '<thead><tr><th>Мейкер</th><th>Тип</th><th>Детали</th><th>Дней</th></tr></thead>' +
      '<tbody>' + anoRows + '</tbody></table></div></div>';

    page.innerHTML = '<div class="section-title">🎬 Контент</div>' +
      kpiRow + '<div class="grid-2">' + pubCard + viewCard + '</div>' + uniCard + dynCard + anoTable;
  } catch(e) {
    page.innerHTML = '<div class="section-title">🎬 Контент</div>' +
      '<div style="text-align:center;padding:40px;color:var(--muted)">Ошибка загрузки</div>';
  }
}

      '<tbody>' + mRows + '</tbody></table></div></div>';

        '<div class="bar-value">' + dvPct + '%</div></div>';

        '<div class="badge badge-' + (c === 0 ? 'gold' : 'blue') + '">' + esc(String(tc.normalized || '0')) + '</div></div>';

      '🎰 Порядок выбора ниш определяется по КЭ (лотерея)</div></div>';

    // Existing catalog logic
    var activeCount = 0, pausedCount = 0, totalPayout = 0;
    var catRows = '';
    if (offers.length > 0) {
      for (var i = 0; i < offers.length; i++) {
        var o = offers[i];
        if (o.status === 'active') activeCount++;
        else if (o.status === 'paused') pausedCount++;
        totalPayout += (o.payout || 0);
        catRows += '<tr>' +
          '<td><strong>' + esc(o.name || o.title || '—') + '</strong>' + (o.description ? '<div style="font-size:12px;color:var(--muted)">' + esc(o.description.substring(0,60)) + '</div>' : '') + '</td>' +
          '<td>' + esc(o.platform || '—') + '</td>' +
          '<td><span class="badge badge-' + (o.status==='active'?'green':o.status==='paused'?'orange':'muted') + '">' + esc(o.status || '—') + '</span></td>' +
          '<td>' + (o.payout ? '$' + fmtNum(o.payout) : '—') + '</td>' +
          '<td>' + esc(o.rotation || '—') + '</td></tr>';
      }
    } else {
      catRows = '<tr><td colspan="5" style="text-align:center;color:var(--muted)">Нет офферов</td></tr>';
    }
    var catalog = '<div class="content-card"><h3>📦 Каталог офферов</h3>' +
      '<div class="kpi-row" style="margin-bottom:12px">' +
      '<div class="kpi-card"><div class="stat-label">Всего</div><div class="stat-value blue">' + offers.length + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">Активных</div><div class="stat-value green">' + activeCount + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">На паузе</div><div class="stat-value" style="color:var(--orange)">' + pausedCount + '</div></div>' +
      '</div>' +

      '<thead><tr><th>Оффер</th><th>Платформа</th><th>Статус</th><th>Выплата</th><th>Ротация</th></tr></thead>' +
      '<tbody>' + catRows + '</tbody></table></div></div>';

    page.innerHTML = '<div class="section-title">💼 Офферы и ниши</div>' +
      '<div class="alert alert-gold">🎯 250 ниш в год · 5 команд AI-офферщиков · 1000 мейкеров на нишу</div>' +
      kpiRow + matrixTable + '<div class="grid-2">' + divCard + compCard + '</div>' + catalog +

  } catch(e) {

      '<div style="text-align:center;padding:40px;color:var(--muted)">Ошибка загрузки</div>';
  }
}


// ---------- HR: MAKERS ----------
async function loadHRMakers() {
  const page = document.getElementById('page-hr-makers');
  const data = await api('/hr/overview');
  const makers = data?.makers || data || [];

  var total = Array.isArray(makers) ? makers.length : 0;
  var active = 0, frozen = 0, totalVideos = 0;
  if (Array.isArray(makers)) {
    for (var i = 0; i < makers.length; i++) {
      if (makers[i].status === 'active') active++;
      if (makers[i].shares_frozen) frozen++;
      totalVideos += (makers[i].videos_count || makers[i].videos || 0);
    }
  }

  var rows = '';
  if (Array.isArray(makers) && makers.length > 0) {
    var sorted = makers.slice().sort(function(a,b) { return (b.ke_score||0) - (a.ke_score||0); });
    for (var j = 0; j < sorted.length; j++) {
      var m = sorted[j];
      rows += '<tr>' +
        '<td>' + (j+1) + '</td>' +
        '<td>' + esc(m.display_name || m.username || '\u2014') + '</td>' +
        '<td><span class="badge badge-' + (m.status==='active'?'green':m.shares_frozen?'red':'muted') + '">' + getStatusLabel(m.status) + (m.shares_frozen ? ' \ud83d\udd12' : '') + '</span></td>' +
        '<td>' + fmtNum(m.videos_count || m.videos || 0) + '</td>' +
        '<td class="gold">' + (m.ke_score != null ? Number(m.ke_score).toFixed(2) : '\u2014') + '</td>' +
        '<td>' + fmtNum(m.shares || 0) + '</td>' +
      '</tr>';
    }
  } else {
    rows = '<tr><td colspan="6" style="text-align:center;color:var(--muted)">\u041d\u0435\u0442 \u043c\u0435\u0439\u043a\u0435\u0440\u043e\u0432</td></tr>';
  }

  page.innerHTML =
    '<div class="section-title">\u041c\u043e\u0438 \u043c\u0435\u0439\u043a\u0435\u0440\u044b</div>' +
    '<div class="kpi-row">' +
      '<div class="kpi-card"><div class="stat-label">\u0412\u0441\u0435\u0433\u043e</div><div class="stat-value blue">' + total + '</div><div class="stat-sub">\u0438\u0437 100 \u043c\u0430\u043a\u0441</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0410\u043a\u0442\u0438\u0432\u043d\u044b\u0445</div><div class="stat-value green">' + active + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0417\u0430\u043c\u043e\u0440\u043e\u0436\u0435\u043d\u043e</div><div class="stat-value" style="color:var(--red)">' + frozen + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0412\u0438\u0434\u0435\u043e \u0432\u0441\u0435\u0433\u043e</div><div class="stat-value">' + fmtNum(totalVideos) + '</div></div>' +
    '</div>' +
    (frozen > 0 ? '<div class="alert alert-warn">\u26a0\ufe0f ' + frozen + ' \u043c\u0435\u0439\u043a\u0435\u0440(\u043e\u0432) \u0441 \u0437\u0430\u043c\u043e\u0440\u043e\u0436\u0435\u043d\u043d\u044b\u043c\u0438 \u0430\u043a\u0446\u0438\u044f\u043c\u0438. \u041f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435 \u0438\u0445 \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u044c.</div>' : '') +
    '<div class="content-card"><h3>\u0420\u0435\u0439\u0442\u0438\u043d\u0433 \u043c\u0435\u0439\u043a\u0435\u0440\u043e\u0432 (\u043f\u043e \u041a\u042d)</h3>' +
      '<div style="overflow-x:auto"><table class="data-table">' +
        '<thead><tr><th>#</th><th>\u0418\u043c\u044f</th><th>\u0421\u0442\u0430\u0442\u0443\u0441</th><th>\u0412\u0438\u0434\u0435\u043e</th><th>\u041a\u042d</th><th>\u0410\u043a\u0446\u0438\u0438</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>' +
    '</div>';
}

// ---------- TASKS ----------
async function loadTasks() {
  const page = document.getElementById('page-tasks');
  const data = await api('/team/tasks');
  const tasks = data?.tasks || data || [];

  var total = Array.isArray(tasks) ? tasks.length : 0;
  var done = 0, inProgress = 0, highPriority = 0;
  var rows = '';
  if (Array.isArray(tasks) && tasks.length > 0) {
    var sorted = tasks.slice().sort(function(a,b) {
      var prio = {high:0,medium:1,low:2};
      return (prio[a.priority]||2) - (prio[b.priority]||2);
    });
    for (var i = 0; i < sorted.length; i++) {
      var t = sorted[i];
      if (t.status === 'done') done++;
      if (t.status === 'in_progress') inProgress++;
      if (t.priority === 'high') highPriority++;
      var prioColor = t.priority === 'high' ? 'red' : t.priority === 'medium' ? 'orange' : 'muted';
      var statusColor = t.status === 'done' ? 'green' : t.status === 'in_progress' ? 'blue' : 'muted';
      rows += '<tr>' +
        '<td>' + esc(t.title || '\u2014') + '</td>' +
        '<td><span class="badge badge-' + statusColor + '">' + esc(t.status || '\u2014') + '</span></td>' +
        '<td><span class="badge badge-' + prioColor + '">' + esc(t.priority || '\u2014') + '</span></td>' +
        '<td>' + esc(t.assignee || '\u2014') + '</td>' +
        '<td>' + fmtDate(t.due_date || t.deadline) + '</td></tr>';
    }
  } else {
    rows = '<tr><td colspan="5" style="text-align:center;color:var(--muted)">\u041d\u0435\u0442 \u0437\u0430\u0434\u0430\u0447</td></tr>';
  }

  var completionPct = total > 0 ? Math.round(done / total * 100) : 0;

  page.innerHTML =
    '<div class="section-title">\u0417\u0430\u0434\u0430\u0447\u0438 \u043a\u043e\u043c\u0430\u043d\u0434\u044b</div>' +
    '<div class="kpi-row">' +
      '<div class="kpi-card"><div class="stat-label">\u0412\u0441\u0435\u0433\u043e</div><div class="stat-value">' + total + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0412 \u0440\u0430\u0431\u043e\u0442\u0435</div><div class="stat-value blue">' + inProgress + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0412\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u043e</div><div class="stat-value green">' + done + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u0412\u044b\u0441\u043e\u043a\u0438\u0439 \u043f\u0440\u0438\u043e\u0440\u0438\u0442\u0435\u0442</div><div class="stat-value" style="color:var(--red)">' + highPriority + '</div></div>' +
      '<div class="kpi-card"><div class="stat-label">\u041f\u0440\u043e\u0433\u0440\u0435\u0441\u0441</div><div class="stat-value gold">' + completionPct + '%</div>' +
        '<div style="background:var(--border);height:6px;border-radius:3px;margin-top:8px"><div style="width:' + completionPct + '%;background:var(--green);height:100%;border-radius:3px"></div></div>' +
      '</div>' +
    '</div>' +
    '<div class="content-card">' +
      '<div style="overflow-x:auto"><table class="data-table">' +
        '<thead><tr><th>\u0417\u0430\u0434\u0430\u0447\u0430</th><th>\u0421\u0442\u0430\u0442\u0443\u0441</th><th>\u041f\u0440\u0438\u043e\u0440\u0438\u0442\u0435\u0442</th><th>\u0418\u0441\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c</th><th>\u0421\u0440\u043e\u043a</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table></div>' +
    '</div>';
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function fmtNum(n) {
  if (n == null) return '0';
  return Number(n).toLocaleString('ru-RU');
}

function fmtDate(d) {
  if (!d) return '—';
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return String(d);
    return dt.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
  } catch { return String(d); }
}

    (isDone ? '<span class="badge badge-green">✅ DONE</span>' : '') +
  '</div>';
}

function buildFunnelBar(label, color, value, total) {
  var pct = total > 0 ? Math.round(value / total * 100) : 0;
  return '<div class="bar-row"><span style="min-width:180px;font-size:12px">' + label + '</span>' +
    '<div style="flex:1;background:var(--border);border-radius:4px;height:20px;overflow:hidden">' +
    '<div style="width:' + pct + '%;background:' + color + ';height:100%;border-radius:4px;min-width:' + (value > 0 ? '2' : '0') + 'px"></div></div>' +
    '<span style="min-width:50px;text-align:right;font-size:12px">' + fmtNum(value) + '</span></div>';
}

async function resolveAnomaly(flagId) {
  if(!confirm('Закрыть флаг #' + flagId + '?')) return;
  try {
    await api('/risk-zone/anomalies/' + flagId + '/resolve', 'POST', {action:'resolved',comment:'Closed from cabinet'});
    await loadRiskZone();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

// ---------- PAIN POINTS ----------
async function loadPainPoints() {
  const page = document.getElementById('page-pain-points');
  try {
    const d = await api('/pain-points');
    const totalOpen = d.total_open || 0;
    const typeIcons = {kaizen:'💡',violation:'🚨',bug:'🐛'};
    const typeNames = {kaizen:'Кайдзен',violation:'Жалоба',bug:'Баг'};
    const catNames = {process:'Процессы',content:'Контент',tech:'Технологии',other:'Прочее'};

    // Counts from API
    var kaizenByStatus = d.kaizen_by_status || {};
    var violationByStatus = d.violation_by_status || {};
    var bugByStatus = d.bug_by_status || {};
    var kaizenByCat = d.kaizen_by_category || {};
    var feed = d.feed || [];

    // Separate feed into categories
    var critical = feed.filter(function(f){return f.priority === 'critical' || f.type === 'violation';});
    var important = feed.filter(function(f){return f.priority === 'important' || (f.priority !== 'critical' && f.type !== 'violation' && f.status !== 'resolved');});
    var resolved = feed.filter(function(f){return f.status === 'resolved' || f.status === 'dismissed';});

    // KPIs
    var resolvedCount = (kaizenByStatus.implemented || 0) + (violationByStatus.resolved || 0) + (bugByStatus.resolved || 0);
    var totalAll = totalOpen + resolvedCount;
    var resolvedPct = totalAll > 0 ? Math.round(resolvedCount / totalAll * 100) : 0;

    // Critical pain cards
    var criticalHtml = '';
    for (var c = 0; c < critical.length; c++) {
      var item = critical[c];
      var typeTag = typeNames[item.type] || item.type || '—';
      criticalHtml += '<div style="background:var(--bg);padding:14px;border-left:3px solid var(--red);margin-bottom:1px">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">' +
          '<div style="font-size:12px;color:var(--text);font-weight:700">' + esc((item.text || '').substring(0, 100)) + '</div>' +
          '<span class="badge badge-red">' + typeTag + '</span></div>' +
        '<div style="font-size:10px;color:var(--muted);line-height:1.6;margin-bottom:8px">' + esc(item.author || '—') + ' · ' + (item.created_at ? new Date(item.created_at).toLocaleDateString('ru-RU') : '—') + '</div>' +
      '</div>';
    }
    if (!criticalHtml) criticalHtml = '<div style="padding:20px;text-align:center;color:var(--muted)">Нет критичных болей</div>';

    // Impact/Urgency matrix
    var matrixHtml = '<div style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;height:260px">' +
      '<div style="background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);padding:12px;display:flex;flex-direction:column;border-radius:6px">' +
        '<div style="font-size:9px;color:var(--red);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">🔴 Сделать сейчас</div>' +
        '<div style="font-size:11px;color:var(--text);line-height:1.7">' + buildMatrixList(critical.slice(0,4)) + '</div></div>' +
      '<div style="background:rgba(212,168,67,0.06);border:1px solid rgba(212,168,67,0.2);padding:12px;display:flex;flex-direction:column;border-radius:6px">' +
        '<div style="font-size:9px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">🟡 Запланировать</div>' +
        '<div style="font-size:11px;color:var(--text);line-height:1.7">' + buildMatrixList(important.slice(0,4)) + '</div></div>' +
      '<div style="background:rgba(88,166,255,0.06);border:1px solid rgba(88,166,255,0.2);padding:12px;display:flex;flex-direction:column;border-radius:6px">' +
        '<div style="font-size:9px;color:var(--blue);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">🔵 Делегировать</div>' +
        '<div style="font-size:11px;color:var(--text);line-height:1.7">' + buildMatrixList(important.slice(4,8)) + '</div></div>' +
      '<div style="background:var(--bg);border:1px solid var(--border);padding:12px;display:flex;flex-direction:column;border-radius:6px">' +
        '<div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">⚫ Вернуться позже</div>' +
        '<div style="font-size:11px;color:var(--text);line-height:1.7">' + buildMatrixList(important.slice(8,12)) + '</div></div>' +
    '</div>';

    // Important pains list
    var importantHtml = '';
    for (var ip = 0; ip < important.length; ip++) {
      var it = important[ip];
      var tIcon = typeIcons[it.type] || '📌';
      var catLbl = catNames[it.category] || it.category || '—';
      importantHtml += '<div style="background:var(--bg);padding:11px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">' +
        '<div style="flex:1"><div style="font-size:12px;color:var(--text)">' + tIcon + ' ' + esc((it.text || '').substring(0, 80)) + '</div>' +
        '<div style="font-size:10px;color:var(--muted)">' + esc(it.author || '') + '</div></div>' +
        '<span class="badge badge-orange">' + catLbl + '</span></div>';
    }
    if (!importantHtml) importantHtml = '<div style="padding:20px;text-align:center;color:var(--muted)">Нет важных болей</div>';

    // Resolved pains list
    var resolvedHtml = '';
    for (var r = 0; r < resolved.length; r++) {
      var rv = resolved[r];
      resolvedHtml += '<div style="background:var(--bg);padding:11px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">' +
        '<div style="flex:1"><div style="font-size:12px;color:var(--text);text-decoration:line-through;opacity:0.6">' + esc((rv.text || '').substring(0, 80)) + '</div>' +
        '<div style="font-size:10px;color:var(--green)">✅ ' + esc(rv.author || '') + '</div></div>' +
        '<span class="badge badge-green">Решено</span></div>';
    }
    if (!resolvedHtml) resolvedHtml = '<div style="padding:20px;text-align:center;color:var(--muted)">Нет решённых болей</div>';

    // Kaizen by category bars
    var catKeys = Object.keys(kaizenByCat);
    var maxCat = 1;
    for (var ck = 0; ck < catKeys.length; ck++) { if (kaizenByCat[catKeys[ck]] > maxCat) maxCat = kaizenByCat[catKeys[ck]]; }
    var catBarsHtml = '';
    var catColors = ['var(--blue)','var(--gold)','var(--green)','var(--muted)'];
    for (var cb = 0; cb < catKeys.length; cb++) {
      var pct = Math.round(kaizenByCat[catKeys[cb]] / maxCat * 100);
      catBarsHtml += '<div class="bar-row"><span style="min-width:100px;font-size:12px">' + (catNames[catKeys[cb]]||catKeys[cb]) + '</span>' +
        '<div style="flex:1;background:var(--border);border-radius:4px;height:18px;overflow:hidden">' +
        '<div style="width:' + pct + '%;background:' + catColors[cb % catColors.length] + ';height:100%;border-radius:4px;min-width:2px"></div></div>' +
        '<span style="min-width:30px;text-align:right;font-size:12px">' + kaizenByCat[catKeys[cb]] + '</span></div>';
    }

    // Assemble
    page.innerHTML =
      '<div class="section-title">🧠 Боли и потребности</div>' +
      '<div class="alert alert-info" style="margin-bottom:16px">' +
        '<strong>🧠 Боли и потребности</strong> · агрегируем сигналы из Пульса, Кайдзена, Зоны риска и Support · приоритизируем по влиянию</div>' +

      // 5 KPI
      '<div class="kpi-row">' +
        '<div class="kpi-card" style="border-top:3px solid var(--red)"><div class="stat-label">Критичных</div><div class="stat-value" style="color:var(--red)">' + critical.length + '</div><div class="stat-sub">требуют решения сейчас</div></div>' +
        '<div class="kpi-card" style="border-top:3px solid var(--orange)"><div class="stat-label">Важных</div><div class="stat-value" style="color:var(--orange)">' + important.length + '</div><div class="stat-sub">в очереди</div></div>' +
        '<div class="kpi-card" style="border-top:3px solid var(--blue)"><div class="stat-label">Решено</div><div class="stat-value" style="color:var(--blue)">' + resolvedCount + '</div><div class="stat-sub">закрыто</div></div>' +
        '<div class="kpi-card" style="border-top:3px solid var(--green)"><div class="stat-label">% решённых</div><div class="stat-value" style="color:var(--green)">' + resolvedPct + '%</div><div class="stat-sub">от всех за квартал</div></div>' +
        '<div class="kpi-card" style="border-top:3px solid var(--purple)"><div class="stat-label">Источников</div><div class="stat-value" style="color:var(--purple)">4</div><div class="stat-sub">Пульс · Кайдзен · Риск · Support</div></div>' +
      '</div>' +

      // Row 1: Critical pains + Matrix
      '<div class="grid-2">' +
        '<div class="content-card"><h3>🔴 Критичные боли</h3>' + criticalHtml + '</div>' +
        '<div class="content-card"><h3>📊 Матрица болей · влияние vs срочность</h3>' + matrixHtml + '</div>' +
      '</div>' +

      // Row 2: Important pains + Resolved
      '<div class="grid-2">' +
        '<div class="content-card"><h3>🟠 Важные боли <span style="font-size:12px;color:var(--muted);font-weight:400">' + important.length + ' шт</span></h3>' + importantHtml + '</div>' +
        '<div class="content-card"><h3>✅ Решено <span style="font-size:12px;color:var(--muted);font-weight:400">' + resolved.length + ' закрытых</span></h3>' + resolvedHtml + '</div>' +
      '</div>' +

      // Kaizen by category
      (catBarsHtml ? '<div class="content-card"><h3>📊 Кайдзен по категориям</h3>' + catBarsHtml + '</div>' : '');

  } catch(e) {
    console.error('Pain points error:', e);
    page.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)"><div style="font-size:32px;margin-bottom:12px">🧠</div>Ошибка загрузки болей</div>';
  }
}

function buildMatrixList(items) {
  if (!items || items.length === 0) return '<span style="color:var(--muted)">—</span>';
  var html = '';
  for (var i = 0; i < items.length; i++) {
    html += '• ' + esc((items[i].text || '').substring(0, 40)) + '<br>';
  }
  return html;
}

function buildProductivityBars(d) {
  const stars = d.productivity_stars || 0;
  const stable = d.productivity_stable || 0;
  const lagging = d.productivity_lagging || 0;
  const critical = d.productivity_critical || 0;
  const silent = d.productivity_silent || 0;
  const total = stars+stable+lagging+critical+silent || 1;
  return `<div style="display:flex;flex-direction:column;gap:8px;">
    ${[
      {label:'🔥 Звёзды (15+)',val:stars,color:'var(--gold)'},
      {label:'💪 Стабильные (12-14)',val:stable,color:'var(--green)'},
      {label:'⚠️ Отстают (9-11)',val:lagging,color:'var(--orange)'},
      {label:'🆘 Критично (<9)',val:critical,color:'var(--red)'},
      {label:'⏸️ Тишина (0)',val:silent,color:'var(--muted)'}
    ].map(r => `<div class="bar-row"><div class="bar-label" style="min-width:140px;font-size:11px;">${r.label}</div><div class="bar-track" style="flex:1;"><div class="bar-fill" style="width:${(r.val/total*100).toFixed(1)}%;background:${r.color};"></div></div><div style="min-width:50px;text-align:right;font-size:12px;font-weight:700;color:var(--text);">${fmtNum(r.val)}</div></div>`).join('')}
  </div>`;
}

      {label:'▶️ YouTube',val:yt,color:'var(--red)'},
      {label:'🎵 TikTok',val:tt,color:'var(--purple)'},
      {label:'📸 Instagram',val:ig,color:'var(--orange)'},
      {label:'📘 Facebook',val:fb,color:'var(--blue)'}

  // --- 5 new blocks (29.05.2026) ---
  var geoData = (d.geography || [{c:'UA',n:'Украина',p:45},{c:'RU',n:'Россия',p:20},{c:'KZ',n:'Казахстан',p:10},{c:'BY',n:'Беларусь',p:8},{c:'UZ',n:'Узбекистан',p:5},{c:'Other',n:'Другие',p:12}]);

  var geoBlock = '<div class="content-card"><h3>🌍 География мейкеров</h3><div class="bar-chart">' + geoRows + '</div></div>';

  var retentionBlock = '<div class="content-card"><h3>📉 Retention когорты</h3>' +
    '<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Когорта</th><th>M1</th><th>M2</th><th>M3</th><th>M6</th><th>M12</th></tr></thead><tbody>' +

    '<tr><td>Май 2026</td><td>100%</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>' +
    '</tbody></table></div><div style="padding:8px 12px;font-size:11px;color:var(--muted)">ℹ️ Данные обновляются ежемесячно</div></div>';

  var wGrowth = d.weekly_growth || [{w:'W21',v:12},{w:'W22',v:18},{w:'W23',v:25},{w:'W24',v:31}];

  var wgMax = 1;
